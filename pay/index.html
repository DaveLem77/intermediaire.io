<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paiement sécurisé</title>
  <style>
    body {
      margin: 0;
      background: #0b1020;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 500px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top: 4px solid white;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 {
      margin: 0 0 10px;
      font-size: 26px;
    }
    p {
      margin: 0;
      opacity: 0.8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>Redirection sécurisée...</h2>
    <p>Veuillez patienter quelques secondes.</p>
  </div>

  <script>
    const parts = window.location.pathname.split("/").filter(Boolean);
    const leadId = parts[parts.length - 1];

    fetch("https://hook.us2.make.com/4vt5dgbfwit7wkgqqtn0wmc1c6o6kam8?lead_id=" + encodeURIComponent(leadId))
      .then(res => res.json())
      .then(data => {
        if (data.url) {
          window.location.href = data.url;
        } else {
          document.body.innerHTML = "<div class='box'><h2>Lien invalide</h2><p>Ce lien de paiement est introuvable ou expiré.</p></div>";
        }
      })
      .catch(() => {
        document.body.innerHTML = "<div class='box'><h2>Erreur</h2><p>Impossible de charger le lien de paiement.</p></div>";
      });
  </script>
</body>
</html>
