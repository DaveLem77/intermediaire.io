<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }

    .logo {
      width: 70px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px;
    }

    .text {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .terms {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .accept {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      text-align: left;
      justify-content: center;
    }

    .accept input {
      width: 26px;
      height: 26px;
      cursor: pointer;
    }

    .accept label {
      font-size: 14px;
      line-height: 1.5;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2f6fff;
      color: white;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .sub {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #ddd;
      border-top: 3px solid #2f6fff;
      border-radius: 50%;
      margin: 0 auto 15px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="card" id="mainCard">
    <img src="media/logob.png" class="logo">

    <h1>Avant de continuer</h1>
    <div class="text">
      Confirmez simplement pour accéder au paiement.
    </div>

    <div class="terms">
      • L’achat donne accès à un lead<br>
      • Aucune vente n’est garantie
    </div>

    <div class="accept">
      <input type="checkbox" id="acceptTerms">
      <label for="acceptTerms">
        J’accepte les conditions
      </label>
    </div>

    <button class="btn" id="continueBtn" disabled>
      Continuer vers le paiement
    </button>

    <div class="sub">
      Paiement sécurisé
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const leadId = params.get("lead_id");

    const acceptTerms = document.getElementById("acceptTerms");
    const continueBtn = document.getElementById("continueBtn");
    const mainCard = document.getElementById("mainCard");

    if (!leadId) {
      mainCard.innerHTML = "<h2>Lien invalide</h2>";
    }

    acceptTerms.addEventListener("change", function () {
      continueBtn.disabled = !this.checked || !leadId;
    });

    continueBtn.addEventListener("click", function () {
      mainCard.innerHTML = `
        <div class="spinner"></div>
        <h2>Redirection...</h2>
        <p style="color:#666;">Veuillez patienter</p>
      `;

      fetch("https://hook.us2.make.com/4vt5dgbfwit7wkgqqtn0wmc1c6o6kam8?lead_id=" + encodeURIComponent(leadId))
        .then(res => res.json())
        .then(data => {
          if (data.url) {
            window.location.href = data.url;
          } else {
            mainCard.innerHTML = "<h2>Erreur</h2><p>Lien invalide</p>";
          }
        })
        .catch(() => {
          mainCard.innerHTML = "<h2>Erreur</h2><p>Impossible de continuer</p>";
        });
    });
  </script>

</body>
</html>
