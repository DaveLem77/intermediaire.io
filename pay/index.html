<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation des conditions</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #142033;
      --muted: #5f6f86;
      --blue: #2f6fff;
      --blue2: #6aa4ff;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: #ffffff;
      display: flex;
      align-items: flex-start; /* 🔥 change clé */
      justify-content: center;
      padding: 12px 16px 20px; /* 🔥 moins d’espace en haut */
    }

    .wrap {
      width: 100%;
      max-width: 620px;
      margin-top: 10px; /* 🔥 remonte visuellement */
    }

    .card {
      background: var(--card);
      border-radius: 22px;
      padding: 26px 24px 22px; /* 🔥 plus compact */
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.04);
    }

    .logo {
      width: 64px; /* 🔥 légèrement réduit */
      display: block;
      margin: 0 auto 12px; /* 🔥 moins d’espace */
    }

    .center {
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.1;
    }

    .intro {
      margin: 0 auto 16px;
      max-width: 440px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .terms {
      margin: 8px 0 18px;
      padding: 0;
      list-style: none;
    }

    .terms li {
      position: relative;
      padding-left: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .terms li + li {
      margin-top: 8px;
    }

    .terms li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue);
    }

    .accept-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }

    .check-wrap input {
      width: 24px;
      height: 24px;
      cursor: pointer;
    }

    .accept-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.4;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(47, 111, 255, 0.18);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .subtext {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #8a97ab;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #e5e7eb;
      border-top: 3px solid var(--blue);
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="mainCard">
      <div class="center">
        <img src="media/logob.png" class="logo">
        <h1>Avant de continuer</h1>
        <p class="intro">
          Confirmez que vous comprenez les conditions avant paiement.
        </p>
      </div>

      <ul class="terms">
        <li>L’achat donne accès à un lead</li>
        <li>Aucune vente n’est garantie</li>
        <li>Le paiement couvre l’accès au contact</li>
      </ul>

      <div class="accept-row">
        <div class="check-wrap">
          <input type="checkbox" id="acceptTerms">
        </div>
        <label for="acceptTerms" class="accept-text">
          J’accepte les conditions
        </label>
      </div>

      <button class="btn" id="continueBtn" disabled>
        Continuer vers le paiement
      </button>

      <div class="subtext">
        Paiement sécurisé
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const leadId = params.get("lead_id");

    const acceptTerms = document.getElementById("acceptTerms");
    const continueBtn = document.getElementById("continueBtn");
    const mainCard = document.getElementById("mainCard");

    if (!leadId) {
      mainCard.innerHTML = "<h2>Lien invalide</h2>";
    }

    acceptTerms.addEventListener("change", function () {
      continueBtn.disabled = !this.checked || !leadId;
    });

    continueBtn.addEventListener("click", function () {
      mainCard.innerHTML = `
        <div class="center">
          <img src="media/logob.png" class="logo">
          <div class="spinner"></div>
          <h2>Redirection...</h2>
          <p style="color:#666;">Veuillez patienter</p>
        </div>
      `;

      fetch("https://hook.us2.make.com/4vt5dgbfwit7wkgqqtn0wmc1c6o6kam8?lead_id=" + encodeURIComponent(leadId))
        .then(res => res.json())
        .then(data => {
          if (data.url) {
            window.location.href = data.url;
          } else {
            mainCard.innerHTML = "<h2>Erreur</h2><p>Lien invalide</p>";
          }
        })
        .catch(() => {
          mainCard.innerHTML = "<h2>Erreur</h2><p>Impossible de continuer</p>";
        });
    });
  </script>
</body>
</html>
