<script>
  const WEBHOOK_URL = "https://hook.us2.make.com/ufvwvu0l7kwh9w9it8v4qk5ywbh39dur";

  const loadingState = document.getElementById("loadingState");
  const errorState = document.getElementById("errorState");
  const successState = document.getElementById("successState");
  const errorText = document.getElementById("errorText");

  function showError(message) {
    loadingState.classList.add("hidden");
    successState.classList.add("hidden");
    errorState.classList.remove("hidden");
    errorText.textContent = message || "Une erreur est survenue.";
  }

  function formatPhoneForTel(phone) {
    return String(phone || "").replace(/[^\d+]/g, "");
  }

  async function loadLead() {
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    console.log("session_id trouvé :", sessionId);

    if (!sessionId) {
      showError("Aucune session Stripe n’a été trouvée dans l’URL.");
      return;
    }

    try {
      const fullUrl = WEBHOOK_URL + "?session_id=" + encodeURIComponent(sessionId);
      console.log("URL appelée :", fullUrl);

      const response = await fetch(fullUrl, {
        method: "GET",
        cache: "no-store"
      });

      console.log("Status HTTP :", response.status);
      console.log("Response ok :", response.ok);

      const rawText = await response.text();
      console.log("Réponse brute :", rawText);

      let data;
      try {
        data = JSON.parse(rawText);
      } catch (e) {
        throw new Error("La réponse reçue n'est pas du JSON valide.");
      }

      console.log("JSON parsé :", data);

      if (!data.success) {
        showError(data.message || "Paiement non confirmé ou lead introuvable.");
        return;
      }

      document.getElementById("leadNom").textContent = data.nom || "—";
      document.getElementById("leadTelephone").textContent = data.telephone || "—";
      document.getElementById("leadVille").textContent = data.ville || "—";
      document.getElementById("leadService").textContent = data.service || "—";
      document.getElementById("leadDescription").textContent = data.description || "—";

      const telClean = formatPhoneForTel(data.telephone);
      const callBtn = document.getElementById("callBtn");
      if (telClean) {
        callBtn.href = "tel:" + telClean;
      } else {
        callBtn.style.display = "none";
      }

      loadingState.classList.add("hidden");
      errorState.classList.add("hidden");
      successState.classList.remove("hidden");
    } catch (error) {
      console.error("ERREUR FETCH :", error);
      showError("Erreur exacte : " + error.message);
    }
  }

  loadLead();
</script>
