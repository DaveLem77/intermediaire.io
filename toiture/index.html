<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Intermediaire.io | Toiture</title>

<link rel="icon" type="image/png" href="media/logob.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f4f8fc;
--bg2:#edf5fb;
--text:#183246;
--title:#0d2233;
--muted:#6a7f90;
--line:rgba(18,55,83,.10);
--accent:#2f80ed;
--accent2:#69c2ff;
--field-bg:rgba(255,255,255,.88);
--max:660px;
}

*{box-sizing:border-box}

html,body{
margin:0;
padding:0;
min-height:100%;
background:linear-gradient(180deg,#edf5fb,#f4f8fc);
}

body{
font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
overflow-x:hidden;
position:relative;
}

.bg{
position:fixed;
inset:-20vh;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.mesh{
position:absolute;
inset:-10%;
background:
radial-gradient(circle at 15% 20%, rgba(105,194,255,.18), transparent 18%),
radial-gradient(circle at 85% 20%, rgba(240,180,90,.15), transparent 16%),
radial-gradient(circle at 50% 85%, rgba(47,128,237,.10), transparent 18%);
filter:blur(20px);
animation:meshMove 16s ease-in-out infinite alternate;
opacity:.9;
}

.orb{
position:absolute;
border-radius:999px;
filter:blur(70px);
opacity:.55;
}

.orb1{
width:420px;
height:420px;
left:-100px;
top:-90px;
background:rgba(105,194,255,.20);
animation:floatA 12s ease-in-out infinite;
}

.orb2{
width:320px;
height:320px;
right:-70px;
top:120px;
background:rgba(240,180,90,.15);
animation:floatB 14s ease-in-out infinite;
}

.orb3{
width:300px;
height:300px;
left:45%;
bottom:-120px;
background:rgba(47,128,237,.12);
animation:floatC 16s ease-in-out infinite;
}

@keyframes floatA{
0%,100%{transform:translate3d(0,0,0)}
50%{transform:translate3d(26px,-18px,0)}
}

@keyframes floatB{
0%,100%{transform:translate3d(0,0,0)}
50%{transform:translate3d(-20px,22px,0)}
}

@keyframes floatC{
0%,100%{transform:translate3d(0,0,0)}
50%{transform:translate3d(16px,-20px,0)}
}

@keyframes meshMove{
0%{transform:translateY(0)}
100%{transform:translateY(-16px)}
}

.shell{
position:relative;
z-index:1;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:10px 24px 24px;
}

.formZone{
width:100%;
max-width:var(--max);
}

.brandBlock{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
margin-bottom:10px;
}

.brandLogo{
width:108px;
height:108px;
object-fit:contain;
margin-bottom:10px;
filter:drop-shadow(0 14px 28px rgba(47,128,237,.12));
}

.brandName{
margin:0;
font-size:23px;
font-weight:900;
color:var(--title);
}

.miniTag{
width:max-content;
margin:0 auto 10px;
padding:8px 14px;
border-radius:999px;
border:1px solid rgba(18,55,83,.08);
background:rgba(255,255,255,.55);
font-size:11.5px;
font-weight:800;
letter-spacing:.1em;
text-transform:uppercase;
color:#4f6a7c;
}

.formTop{
text-align:center;
margin-bottom:14px;
}

.formTop h1{
margin:0 0 8px;
font-size:34px;
line-height:1.1;
color:var(--title);
letter-spacing:-1px;
}

.infoRow{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
font-size:13px;
font-weight:700;
color:var(--muted);
}

.infoItem{
display:flex;
align-items:center;
gap:6px;
}

.infoIcon{
width:16px;
height:16px;
}

form{
display:grid;
gap:10px;
}

.row2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input,textarea{
width:100%;
border:1px solid var(--line);
border-radius:18px;
padding:18px;
font:inherit;
font-weight:600;
background:var(--field-bg);
box-shadow:0 8px 22px rgba(16,44,68,.05);
outline:none;
}

input{height:58px;}

textarea{
min-height:118px;
resize:vertical;
}

input:focus,textarea:focus{
border-color:rgba(47,128,237,.4);
box-shadow:0 0 0 4px rgba(47,128,237,.08);
}

.consent{
display:flex;
align-items:flex-start;
gap:10px;
font-size:12px;
color:#5a7081;
}

.consent input{
width:18px;
height:18px;
accent-color:var(--accent);
}

.submitBtn{
margin-top:2px;
width:100%;
border:none;
border-radius:18px;
padding:18px;
font-size:16px;
font-weight:900;
color:white;
cursor:pointer;
background:linear-gradient(135deg,var(--accent),var(--accent2));
box-shadow:0 18px 40px rgba(47,128,237,.20);
position:relative;
overflow:hidden;
animation:buttonBreath 3.4s ease-in-out infinite;
}

.submitBtn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:70%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
transform:skewX(-20deg);
animation:shine 3.8s infinite;
}

@keyframes shine{
0%{left:-120%}
55%{left:130%}
100%{left:130%}
}

@keyframes buttonBreath{
0%,100%{box-shadow:0 18px 40px rgba(47,128,237,.20)}
50%{box-shadow:0 22px 46px rgba(47,128,237,.28)}
}

.bottomSpace{
height:26px;
}

@media(max-width:640px){

.shell{padding:6px 18px 18px;align-items:flex-start;}

.brandLogo{width:96px;height:96px;}

.row2{grid-template-columns:1fr;}

.formTop h1{font-size:28px;}

.infoRow{font-size:12px}

}

</style>
</head>

<body>

<div class="bg">
<div class="mesh"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
</div>

<main class="shell">

<section class="formZone">

<div class="brandBlock">
<img class="brandLogo" src="media/logob.png">
<p class="brandName">Intermediaire.io</p>
</div>

<div class="miniTag">Toiture</div>

<div class="formTop">

<h1>Décrivez votre besoin en toiture</h1>

<div class="infoRow">

<span class="infoItem">
<svg class="infoIcon" viewBox="0 0 24 24" fill="none">
<path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2"/>
<circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
</svg>
Une seule demande
</span>

<span class="infoItem">
<svg class="infoIcon" viewBox="0 0 24 24" fill="none">
<path d="M4 12h16" stroke="currentColor" stroke-width="2"/>
<path d="M13 5l7 7-7 7" stroke="currentColor" stroke-width="2"/>
</svg>
Sans appeler partout
</span>

<span class="infoItem">
<svg class="infoIcon" viewBox="0 0 24 24" fill="none">
<path d="M7 12.5l3 3 7-7" stroke="currentColor" stroke-width="2"/>
<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
</svg>
Contracteur local
</span>

</div>

</div>

<form>

<div class="row2">
<input type="text" placeholder="Prénom" required>
<input type="text" placeholder="Nom" required>
</div>

<div class="row2">
<input type="tel" placeholder="Téléphone" required>
<input type="email" placeholder="Courriel" required>
</div>

<textarea placeholder="Décrivez vos travaux de toiture..." required></textarea>

<div class="consent">
<input type="checkbox" required>
<label>Je confirme qu’il s’agit d’un vrai besoin et j’accepte que mes informations soient envoyées à des contracteurs de ma région.</label>
</div>

<button class="submitBtn">Trouver le bon contracteur</button>

<div class="bottomSpace"></div>

</form>

</section>
</main>

</body>
</html>
