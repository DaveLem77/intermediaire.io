<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intermediaire.io | Toiture</title>
  <meta name="description" content="Décrivez votre besoin en toiture et soyez mis en relation avec le bon contracteur de votre région." />
  <link rel="icon" type="image/png" href="media/logob.png" />
  <link rel="apple-touch-icon" href="media/logob.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f4f8fc;
      --bg2:#edf5fb;
      --text:#183246;
      --title:#0d2233;
      --muted:#6a7f90;
      --line:rgba(18,55,83,.10);
      --line-strong:rgba(18,55,83,.16);
      --accent:#2f80ed;
      --accent2:#69c2ff;
      --accent3:#f0b45a;
      --field-bg:rgba(255,255,255,.88);
      --max:660px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 0% 0%, rgba(105,194,255,.11), transparent 60%),
        radial-gradient(1000px 620px at 100% 0%, rgba(240,180,90,.10), transparent 58%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      overflow-x:hidden;
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .mesh{
      position:absolute;
      inset:-10%;
      background:
        radial-gradient(circle at 15% 20%, rgba(105,194,255,.18), transparent 18%),
        radial-gradient(circle at 85% 20%, rgba(240,180,90,.15), transparent 16%),
        radial-gradient(circle at 50% 85%, rgba(47,128,237,.10), transparent 18%);
      filter:blur(20px);
      animation:meshMove 16s ease-in-out infinite alternate;
      opacity:.95;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(70px);
      opacity:.58;
      will-change:transform;
    }

    .orb1{
      width:420px;
      height:420px;
      left:-100px;
      top:-90px;
      background:rgba(105,194,255,.20);
      animation:floatA 12s ease-in-out infinite;
    }

    .orb2{
      width:320px;
      height:320px;
      right:-70px;
      top:120px;
      background:rgba(240,180,90,.15);
      animation:floatB 14s ease-in-out infinite;
    }

    .orb3{
      width:300px;
      height:300px;
      left:45%;
      bottom:-120px;
      background:rgba(47,128,237,.12);
      animation:floatC 16s ease-in-out infinite;
    }

    @keyframes floatA{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(26px,-18px,0) scale(1.06)}
    }

    @keyframes floatB{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(-20px,22px,0) scale(1.05)}
    }

    @keyframes floatC{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(16px,-20px,0) scale(1.08)}
    }

    @keyframes meshMove{
      0%{transform:translate3d(0,0,0) scale(1)}
      100%{transform:translate3d(0,-16px,0) scale(1.04)}
    }

    .shell{
      position:relative;
      z-index:1;
      min-height:100svh;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 24px 24px;
    }

    .formZone{
      width:100%;
      max-width:var(--max);
    }

    .brandBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-bottom:10px;
    }

    .brandLogo{
      width:108px;
      height:108px;
      object-fit:contain;
      display:block;
      margin:0 auto 10px;
      filter:drop-shadow(0 14px 28px rgba(47,128,237,.12));
    }

    .brandName{
      margin:0;
      color:var(--title);
      font-size:23px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
    }

    .miniTag{
      width:max-content;
      max-width:100%;
      margin:0 auto 8px;
      padding:9px 14px;
      border-radius:999px;
      border:1px solid rgba(18,55,83,.08);
      background:rgba(255,255,255,.54);
      backdrop-filter:blur(10px);
      color:#4f6a7c;
      font-size:11.5px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
      box-shadow:0 8px 18px rgba(16,44,68,.04);
    }

    .formTop{
      text-align:center;
      margin:0 auto 12px;
      max-width:520px;
    }

    .formTop h1{
      margin:0 0 8px;
      color:var(--title);
      font-size:clamp(29px, 4vw, 40px);
      line-height:1.04;
      letter-spacing:-1.15px;
    }

    .infoRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      line-height:1.4;
    }

    .infoItem{
      display:inline-flex;
      align-items:center;
      gap:7px;
      white-space:nowrap;
    }

    .infoIcon{
      width:16px;
      height:16px;
      display:inline-block;
      flex:0 0 auto;
      opacity:.88;
    }

    form{
      display:grid;
      gap:10px;
    }

    .row2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      outline:none;
      border-radius:18px;
      padding:18px 18px;
      font:inherit;
      font-size:15px;
      font-weight:600;
      color:var(--title);
      background:var(--field-bg);
      backdrop-filter:blur(10px);
      box-shadow:
        0 8px 22px rgba(16,44,68,.05),
        0 1px 0 rgba(255,255,255,.75) inset;
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .18s ease;
      -webkit-appearance:none;
      appearance:none;
    }

    input{
      height:58px;
    }

    textarea{
      min-height:118px;
      resize:vertical;
      line-height:1.55;
    }

    input:hover,
    textarea:hover{
      border-color:var(--line-strong);
      background:rgba(255,255,255,.92);
      box-shadow:
        0 12px 26px rgba(16,44,68,.07),
        0 1px 0 rgba(255,255,255,.8) inset;
    }

    input:focus,
    textarea:focus{
      border-color:rgba(47,128,237,.42);
      background:#fff;
      box-shadow:
        0 12px 28px rgba(47,128,237,.10),
        0 0 0 4px rgba(47,128,237,.08);
    }

    input::placeholder,
    textarea::placeholder{
      color:#93a6b5;
      font-weight:600;
    }

    .consent{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-top:2px;
      padding:2px 2px 0;
    }

    .consent input[type="checkbox"]{
      width:18px;
      height:18px;
      min-width:18px;
      margin:2px 0 0;
      padding:0;
      border-radius:5px;
      accent-color:var(--accent);
      box-shadow:none;
      background:#fff;
      cursor:pointer;
    }

    .consent label{
      margin:0;
      color:#5a7081;
      font-size:12px;
      line-height:1.42;
      font-weight:600;
      cursor:pointer;
    }

    .submitBtn{
      position:relative;
      overflow:hidden;
      margin-top:2px;
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px 20px;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:
        0 18px 40px rgba(47,128,237,.20),
        0 0 0 1px rgba(255,255,255,.08) inset;
      transition:transform .16s ease, filter .16s ease, box-shadow .16s ease;
      animation:buttonBreath 3.4s ease-in-out infinite;
    }

    .submitBtn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:68%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.24), transparent);
      transform:skewX(-20deg);
      animation:shine 3.8s ease-in-out infinite;
    }

    .submitBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
      box-shadow:0 22px 46px rgba(47,128,237,.24);
    }

    .submitBtn:active{
      transform:translateY(0);
    }

    @keyframes shine{
      0%{left:-120%}
      55%{left:130%}
      100%{left:130%}
    }

    @keyframes buttonBreath{
      0%,100%{box-shadow:0 18px 40px rgba(47,128,237,.20)}
      50%{box-shadow:0 22px 46px rgba(47,128,237,.26)}
    }

    .bottomSpace{
      height:20px;
    }

    @media (max-width: 640px){
      .shell{
        padding:8px 18px 18px;
        align-items:flex-start;
      }

      .brandBlock{
        margin-bottom:8px;
      }

      .brandLogo{
        width:98px;
        height:98px;
        margin-bottom:8px;
      }

      .brandName{
        font-size:21px;
      }

      .miniTag{
        font-size:11px;
        margin-bottom:8px;
        padding:8px 12px;
      }

      .formTop{
        margin-bottom:12px;
        max-width:340px;
      }

      .formTop h1{
        font-size:27px;
        margin-bottom:8px;
      }

      .infoRow{
        gap:10px 12px;
        font-size:12.5px;
      }

      .row2{
        grid-template-columns:1fr;
      }

      input{
        height:56px;
      }

      textarea{
        min-height:108px;
      }

      .consent label{
        font-size:11.5px;
      }

      .submitBtn{
        padding:17px 18px;
      }

      .bottomSpace{
        height:14px;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="mesh"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="shell">
    <section class="formZone">
      <div class="brandBlock">
        <img class="brandLogo" src="media/logob.png" alt="Logo Intermediaire.io">
        <p class="brandName">Intermediaire.io</p>
      </div>

      <div class="miniTag">Toiture</div>

      <div class="formTop">
        <h1>Décrivez votre besoin en toiture.</h1>

        <div class="infoRow">
          <span class="infoItem">
            <svg class="infoIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
            </svg>
            Une seule demande
          </span>

          <span class="infoItem">
            <svg class="infoIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Sans appeler partout
          </span>

          <span class="infoItem">
            <svg class="infoIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 12.5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            </svg>
            Bon contracteur local
          </span>
        </div>
      </div>

      <form action="#" method="post">
        <div class="row2">
          <input id="prenom" name="prenom" type="text" placeholder="Prénom" required>
          <input id="nom" name="nom" type="text" placeholder="Nom" required>
        </div>

        <div class="row2">
          <input id="telephone" name="telephone" type="tel" inputmode="tel" placeholder="Téléphone" required>
          <input id="courriel" name="courriel" type="email" placeholder="Courriel" required>
        </div>

        <textarea id="travaux" name="travaux" placeholder="Décrivez vos travaux de toiture..." required></textarea>

        <div class="consent">
          <input id="confirmation" name="confirmation" type="checkbox" required>
          <label for="confirmation">
            Je confirme qu’il s’agit d’un vrai besoin et j’accepte que mes informations soient partagées à des contracteurs de ma région.
          </label>
        </div>

        <button class="submitBtn" type="submit">Trouver le bon contracteur</button>

        <div class="bottomSpace" aria-hidden="true"></div>
      </form>
    </section>
  </main>
</body>
</html>
