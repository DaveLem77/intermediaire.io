<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intermediaire.io | Votre besoin, bien dirigé</title>
  <meta name="description" content="Intermediaire.io vous aide à connecter votre besoin au bon contracteur, simplement et rapidement." />
  <link rel="icon" type="image/png" href="media/logob.png" />
  <link rel="apple-touch-icon" href="media/logob.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f9fc;
      --bg2:#edf5fb;
      --text:#183246;
      --title:#0d2233;
      --muted:#6c8191;
      --line:rgba(18,55,83,.10);
      --line-strong:rgba(18,55,83,.16);
      --accent:#2f80ed;
      --accent2:#64bfff;
      --field-bg:rgba(255,255,255,.84);
      --max:620px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
    }

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--bg2), var(--bg));
      overflow-x:hidden;
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(64px);
      opacity:.40;
      animation:float 16s ease-in-out infinite;
      will-change:transform;
    }

    .orb1{
      width:430px;
      height:430px;
      left:-120px;
      top:-90px;
      background:rgba(100,191,255,.22);
    }

    .orb2{
      width:340px;
      height:340px;
      right:-90px;
      top:90px;
      background:rgba(240,180,90,.14);
      animation-delay:-5s;
    }

    .orb3{
      width:280px;
      height:280px;
      left:50%;
      bottom:-120px;
      transform:translateX(-50%);
      background:rgba(47,128,237,.10);
      animation-delay:-9s;
    }

    @keyframes float{
      0%,100%{transform:translate3d(0,0,0) scale(1)}
      50%{transform:translate3d(0,-22px,0) scale(1.04)}
    }

    .shell{
      position:relative;
      z-index:1;
      min-height:100svh;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 24px;
    }

    .formZone{
      width:100%;
      max-width:var(--max);
    }

    .brandBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      margin-bottom:16px;
    }

    .brandLogo{
      width:118px;
      height:118px;
      object-fit:contain;
      display:block;
      margin:0 auto 14px;
      filter:drop-shadow(0 14px 30px rgba(47,128,237,.10));
    }

    .brandName{
      margin:0;
      color:var(--title);
      font-size:24px;
      font-weight:900;
      line-height:1;
      letter-spacing:-.03em;
    }

    .miniTag{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin:0 0 10px;
      color:#5c7688;
      font-size:11.5px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    .miniTagDot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 0 0 6px rgba(47,128,237,.08);
    }

    .formTop{
      text-align:center;
      margin:0 auto 16px;
      max-width:420px;
    }

    .formTop h1{
      margin:0;
      color:var(--title);
      font-size:clamp(29px, 4vw, 42px);
      line-height:1.02;
      letter-spacing:-1.2px;
    }

    form{
      display:grid;
      gap:10px;
    }

    .row2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    input, textarea{
      width:100%;
      border:1px solid var(--line);
      outline:none;
      border-radius:18px;
      padding:18px 18px;
      font:inherit;
      font-size:15px;
      font-weight:600;
      color:var(--title);
      background:var(--field-bg);
      backdrop-filter:blur(8px);
      box-shadow:
        0 6px 18px rgba(16,44,68,.05),
        0 1px 0 rgba(255,255,255,.70) inset;
      transition:border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .18s ease;
      -webkit-appearance:none;
      appearance:none;
    }

    input{
      height:58px;
    }

    textarea{
      min-height:118px;
      resize:vertical;
      line-height:1.55;
    }

    input:hover,
    textarea:hover{
      border-color:var(--line-strong);
      background:rgba(255,255,255,.90);
      box-shadow:
        0 10px 22px rgba(16,44,68,.07),
        0 1px 0 rgba(255,255,255,.78) inset;
    }

    input:focus,
    textarea:focus{
      border-color:rgba(47,128,237,.42);
      background:#fff;
      box-shadow:
        0 10px 26px rgba(47,128,237,.10),
        0 0 0 4px rgba(47,128,237,.08);
    }

    input::placeholder,
    textarea::placeholder{
      color:#94a7b6;
      font-weight:600;
    }

    .consent{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-top:2px;
      padding:2px 2px 0;
    }

    .consent input[type="checkbox"]{
      width:18px;
      height:18px;
      min-width:18px;
      margin:2px 0 0;
      padding:0;
      border-radius:5px;
      accent-color:var(--accent);
      box-shadow:none;
      background:#fff;
      cursor:pointer;
    }

    .consent label{
      margin:0;
      color:#5a7081;
      font-size:12px;
      line-height:1.45;
      font-weight:600;
      cursor:pointer;
    }

    .submitBtn{
      position:relative;
      overflow:hidden;
      margin-top:2px;
      width:100%;
      border:none;
      border-radius:18px;
      padding:18px 20px;
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow:0 16px 36px rgba(47,128,237,.18);
      transition:transform .16s ease, filter .16s ease, box-shadow .16s ease;
      animation:buttonBreath 3.4s ease-in-out infinite;
    }

    .submitBtn::before{
      content:"";
      position:absolute;
      top:0;
      left:-120%;
      width:68%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform:skewX(-20deg);
      animation:shine 3.8s ease-in-out infinite;
    }

    .submitBtn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
      box-shadow:0 20px 42px rgba(47,128,237,.22);
    }

    .submitBtn:active{
      transform:translateY(0);
    }

    @keyframes shine{
      0%{left:-120%}
      55%{left:130%}
      100%{left:130%}
    }

    @keyframes buttonBreath{
      0%,100%{box-shadow:0 16px 36px rgba(47,128,237,.18)}
      50%{box-shadow:0 20px 42px rgba(47,128,237,.24)}
    }

    @media (max-width: 640px){
      .shell{
        padding:18px 18px;
      }

      .brandLogo{
        width:104px;
        height:104px;
        margin-bottom:12px;
      }

      .brandName{
        font-size:22px;
      }

      .miniTag{
        font-size:11px;
        margin-bottom:8px;
      }

      .formTop{
        margin-bottom:14px;
        max-width:320px;
      }

      .formTop h1{
        font-size:28px;
      }

      .row2{
        grid-template-columns:1fr;
      }

      input{
        height:56px;
      }

      textarea{
        min-height:108px;
      }

      .consent label{
        font-size:11.5px;
      }

      .submitBtn{
        padding:17px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <main class="shell">
    <section class="formZone">
      <div class="brandBlock">
        <img class="brandLogo" src="media/logob.png" alt="Logo Intermediaire.io">
        <p class="brandName">Intermediaire.io</p>
      </div>

      <div class="miniTag">
        <span class="miniTagDot"></span>
        Trouvez la bonne solution
      </div>

      <div class="formTop">
        <h1>Votre besoin, bien dirigé.</h1>
      </div>

      <form action="#" method="post">
        <div class="row2">
          <input id="prenom" name="prenom" type="text" placeholder="Prénom" required>
          <input id="nom" name="nom" type="text" placeholder="Nom" required>
        </div>

        <div class="row2">
          <input id="telephone" name="telephone" type="tel" inputmode="tel" placeholder="Téléphone" required>
          <input id="courriel" name="courriel" type="email" placeholder="Courriel" required>
        </div>

        <textarea id="travaux" name="travaux" placeholder="Décrivez votre besoin..." required></textarea>

        <div class="consent">
          <input id="confirmation" name="confirmation" type="checkbox" required>
          <label for="confirmation">
            Je confirme qu’il s’agit d’un vrai besoin et j’accepte que mes informations soient partagées à des contracteurs de ma région.
          </label>
        </div>

        <button class="submitBtn" type="submit">Me connecter au bon contracteur</button>
      </form>
    </section>
  </main>
</body>
</html>
