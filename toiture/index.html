<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Couvreur Sherbrooke — Intermediaire.io</title>
<link rel="icon" type="image/png" href="media/logob.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#f7f9fc}
body{
  font-family:'Sora',system-ui,sans-serif;
  color:#102132;
  -webkit-font-smoothing:antialiased;
}

.page{
  min-height:70vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:28px 20px 40px;
  position:relative;
  overflow:hidden;
}

/* subtle premium background */
.page::before{
  content:'';
  position:absolute;
  width:540px;
  height:540px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(59,130,246,.08) 0%, rgba(59,130,246,0) 68%);
  top:-180px;
  left:50%;
  transform:translateX(-50%);
  pointer-events:none;
}
.page::after{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 25%, rgba(255,255,255,.9), rgba(255,255,255,0) 44%),
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0));
  pointer-events:none;
}

.brand,
.urgency,
.hero,
.g-row,
.cta-outer,
.cta-note,
.funnel{
  position:relative;
  z-index:2;
}

/* BRAND */
.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  margin-bottom:22px;
}
.brand img{
  width:76px;
  height:76px;
  object-fit:contain;
  filter:drop-shadow(0 10px 24px rgba(15,23,42,.08));
}
.brand-name{
  font-size:18px;
  font-weight:800;
  color:#8aa0b3;
  letter-spacing:-.02em;
}

/* URGENCY PREMIUM */
.urgency{
  display:inline-flex;
  align-items:center;
  gap:9px;
  background:rgba(255,255,255,.8);
  border:1px solid #e6edf4;
  border-radius:999px;
  padding:10px 15px;
  margin-bottom:24px;
  min-width:270px;
  justify-content:center;
  box-shadow:0 8px 22px rgba(15,23,42,.04);
  backdrop-filter:blur(8px);
}
.u-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#2563eb;
  flex-shrink:0;
  opacity:.8;
  animation:softPulse 2.8s ease-in-out infinite;
}
@keyframes softPulse{
  0%,100%{transform:scale(1);opacity:.75}
  50%{transform:scale(1.18);opacity:1}
}
.u-text{
  font-size:12px;
  font-weight:800;
  color:#647b90;
  white-space:nowrap;
  letter-spacing:-.01em;
  transition:opacity .35s;
}

/* HERO */
.hero{
  text-align:center;
  max-width:520px;
  margin-bottom:28px;
}
.hero h1{
  font-size:clamp(29px,6vw,40px);
  font-weight:900;
  letter-spacing:-1.6px;
  line-height:1.06;
  color:#102132;
  margin-bottom:0;
}
.hero h1 .accent{
  color:#1d4ed8;
}
.hero p{display:none}

/* DIAGRAM hidden for more premium look */
.diagram{display:none}

/* GOOGLE REVIEW */
.g-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:rgba(255,255,255,.86);
  border:1px solid #e8eef5;
  border-radius:16px;
  padding:12px 14px;
  margin-bottom:34px;
  max-width:390px;
  width:100%;
  box-shadow:0 10px 30px rgba(15,23,42,.05);
  backdrop-filter:blur(10px);
  white-space:nowrap;
  overflow:hidden;
}
.g-left{
  display:flex;
  align-items:center;
  gap:7px;
  flex-shrink:0;
}
.g-left img{
  width:18px;
  height:18px;
  object-fit:contain;
}
.g-stars{
  color:#fbbc04;
  font-size:12px;
  letter-spacing:.35px;
}
.g-score{
  font-size:13px;
  font-weight:900;
  color:#102132;
}
.g-sep{
  width:1px;
  height:22px;
  background:#e6edf5;
  flex-shrink:0;
}
.g-quote{
  font-size:11.5px;
  font-weight:700;
  color:#6b8194;
  line-height:1;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.g-quote strong{color:#102132}
.g-verified{
  flex-shrink:0;
  font-size:10px;
  font-weight:800;
  color:#1d4ed8;
  background:#eff6ff;
  border-radius:999px;
  padding:4px 8px;
  white-space:nowrap;
}

/* CTA PREMIUM */
.cta-outer{
  width:100%;
  max-width:430px;
  margin:0 auto;
  display:flex;
  justify-content:center;
}

.cta-btn{
  position:relative;
  width:100%;
  height:66px;
  border:none;
  border-radius:18px;
  font-family:'Sora',sans-serif;
  font-size:17px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  letter-spacing:-.02em;
  overflow:hidden;
  background:linear-gradient(135deg,#163f9f 0%, #2563eb 55%, #377dff 100%);
  box-shadow:
    0 16px 38px rgba(37,99,235,.18),
    inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .28s ease, box-shadow .28s ease, filter .28s ease;
}

.cta-btn::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:18px;
  background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,.14) 48%, transparent 100%);
  transform:translateX(-140%);
  animation:softShine 4.8s ease-in-out infinite;
  pointer-events:none;
}

@keyframes softShine{
  0%,65%,100%{transform:translateX(-140%)}
  30%{transform:translateX(140%)}
}

.cta-btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 22px 48px rgba(37,99,235,.24),
    inset 0 1px 0 rgba(255,255,255,.2);
  filter:saturate(1.03);
}
.cta-btn:active{
  transform:scale(.985);
  box-shadow:
    0 10px 24px rgba(37,99,235,.16),
    inset 0 1px 0 rgba(255,255,255,.16);
}

.cta-inner{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.cta-arrow{
  display:inline-block;
  font-style:normal;
  transition:transform .22s ease;
}
.cta-btn:hover .cta-arrow{
  transform:translateX(3px);
}

.cta-note{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-top:14px;
  font-size:12px;
  font-weight:700;
  color:#9bb0c1;
}
.dot-sep{
  width:3px;
  height:3px;
  border-radius:50%;
  background:#cbd8e2;
}

.cta-urgency-note{display:none}

/* FUNNEL */
.funnel{
  display:none;
  width:100%;
  max-width:410px;
  flex-direction:column;
  align-items:center;
}
.prog-wrap{
  width:100%;
  margin-bottom:26px;
}
.prog-bar{
  height:4px;
  background:#e4edf4;
  border-radius:999px;
  overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,#1d4ed8,#60a5fa);
  border-radius:999px;
  transition:width .4s cubic-bezier(.4,0,.2,1);
}
.prog-lbl{
  font-size:11px;
  font-weight:700;
  color:#9ab0c0;
  margin-top:8px;
  letter-spacing:.04em;
}
.step{
  width:100%;
  animation:fadeUp .28s cubic-bezier(.22,1,.36,1);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:none}
}
.q{
  font-size:clamp(23px,5vw,28px);
  font-weight:900;
  letter-spacing:-1px;
  color:#102132;
  margin-bottom:20px;
  line-height:1.14;
  text-align:center;
}
.tiles{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  width:100%;
}
.tiles.three{
  grid-template-columns:1fr 1fr 1fr;
}
.tile{
  border:1.5px solid #e1eaf2;
  border-radius:17px;
  padding:16px 12px 13px;
  background:rgba(255,255,255,.92);
  cursor:pointer;
  text-align:left;
  transition:all .16s ease;
  display:flex;
  flex-direction:column;
  gap:5px;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 8px 22px rgba(15,23,42,.03);
}
.tile:hover{
  border-color:#bfd6ee;
  transform:translateY(-1px);
  box-shadow:0 14px 28px rgba(15,23,42,.05);
}
.tile.on{
  border-color:#2563eb;
  background:#f4f8ff;
  box-shadow:0 0 0 4px rgba(37,99,235,.08);
}
.tile .ico{
  font-size:24px;
  line-height:1;
}
.tile .lbl{
  font-size:13.5px;
  font-weight:800;
  color:#102132;
  letter-spacing:-.02em;
}
.tile .sub{
  font-size:11.5px;
  font-weight:600;
  color:#8da3b4;
}

.big-input{
  width:100%;
  height:58px;
  border:1.5px solid #dfe8f0;
  border-radius:15px;
  padding:0 18px;
  font-family:'Sora',sans-serif;
  font-size:17px;
  font-weight:700;
  color:#102132;
  background:rgba(255,255,255,.95);
  outline:none;
  transition:border .15s, box-shadow .15s, background .15s;
  box-shadow:0 8px 22px rgba(15,23,42,.03);
}
.big-input::placeholder{
  color:#bfd0dc;
  font-weight:600;
}
.big-input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.09);
  background:#fff;
}

.big-textarea{
  width:100%;
  min-height:110px;
  border:1.5px solid #dfe8f0;
  border-radius:15px;
  padding:16px 18px;
  font-family:'Sora',sans-serif;
  font-size:15px;
  font-weight:700;
  color:#102132;
  background:rgba(255,255,255,.95);
  outline:none;
  transition:border .15s, box-shadow .15s, background .15s;
  resize:vertical;
  margin-top:12px;
  box-shadow:0 8px 22px rgba(15,23,42,.03);
}
.big-textarea::placeholder{
  color:#bfd0dc;
  font-weight:600;
}
.big-textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.09);
  background:#fff;
}

.next{
  width:100%;
  height:56px;
  border:none;
  border-radius:15px;
  font-family:'Sora',sans-serif;
  font-size:16px;
  font-weight:900;
  color:white;
  cursor:pointer;
  background:linear-gradient(135deg,#163f9f 0%, #2563eb 55%, #377dff 100%);
  box-shadow:0 12px 28px rgba(37,99,235,.18);
  transition:transform .16s ease, box-shadow .16s ease;
  margin-top:14px;
  letter-spacing:-.02em;
}
.next:hover{
  transform:translateY(-1px);
  box-shadow:0 18px 36px rgba(37,99,235,.22);
}
.next:active{transform:translateY(0)}
.next:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
  box-shadow:none;
}

.back{
  width:100%;
  height:52px;
  border:1.5px solid #dce7ef;
  border-radius:15px;
  font-family:'Sora',sans-serif;
  font-size:15px;
  font-weight:800;
  color:#637b8e;
  cursor:pointer;
  background:rgba(255,255,255,.95);
  transition:all .15s;
  margin-top:10px;
  box-shadow:0 8px 20px rgba(15,23,42,.02);
}
.back:hover{
  border-color:#c5d4e1;
  background:#fff;
}
.back:active{transform:scale(.99)}

.consent-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  background:rgba(255,255,255,.9);
  border:1px solid #e4edf4;
  border-radius:14px;
  padding:13px 14px;
  margin-top:8px;
}
.consent-row input{
  width:16px;
  height:16px;
  min-width:16px;
  margin-top:2px;
  accent-color:#2563eb;
  cursor:pointer;
  flex-shrink:0;
}
.consent-row label{
  font-size:12px;
  font-weight:600;
  color:#5f7a8f;
  line-height:1.5;
  cursor:pointer;
}
.gbadge-sm{
  display:flex;
  align-items:center;
  gap:7px;
  justify-content:center;
  margin-top:14px;
}
.gbadge-sm img{
  width:16px;
  height:16px;
  object-fit:contain;
}
.gbadge-sm .stars{
  color:#fbbc04;
  font-size:11px;
}
.gbadge-sm .txt{
  font-size:11.5px;
  font-weight:700;
  color:#9ab0c0;
}
.success{
  width:100%;
  text-align:center;
  animation:fadeUp .45s cubic-bezier(.22,1,.36,1);
}
.s-ring{
  width:72px;
  height:72px;
  border-radius:50%;
  background:linear-gradient(135deg,#1d4ed8,#60a5fa);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 14px 30px rgba(37,99,235,.18);
}
.s-ring svg{
  width:32px;
  height:32px;
  stroke:white;
  fill:none;
  stroke-width:3;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.success h2{
  font-size:26px;
  font-weight:900;
  letter-spacing:-.04em;
  margin-bottom:10px;
}
.success p{
  font-size:15px;
  font-weight:600;
  color:#6d8597;
  line-height:1.65;
}

@media(max-width:380px){
  .tiles,.tiles.three{grid-template-columns:1fr 1fr}
  .hero h1{font-size:25px}
  .g-quote{font-size:11px}
  .cta-btn{font-size:16px}
}
</style>
</head>
<body>
<div class="page" id="page">

  <div class="brand" id="elBrand">
    <img src="media/logob.png" alt="Intermediaire.io">
    <span class="brand-name">Intermediaire.io</span>
  </div>

  <div class="urgency" id="elUrgency">
    <span class="u-dot"></span>
    <span class="u-text" id="uText">12 demandes envoyées aujourd'hui à Sherbrooke</span>
  </div>

  <div class="hero" id="elHero">
    <h1>
      Évitez les appels inutiles.<br>
      Trouvez un couvreur à <span class="accent">Sherbrooke</span> rapidement.
    </h1>
  </div>

  <div class="diagram" id="elDiagram"></div>

  <div class="g-row" id="elReview">
    <div class="g-left">
      <img src="media/google.png" alt="Google">
      <span class="g-stars">★★★★★</span>
      <span class="g-score">4.9</span>
    </div>
    <div class="g-sep"></div>
    <div class="g-quote"><strong>2 appels reçus le lendemain</strong> · Simple et rapide</div>
    <div class="g-verified">Vérifié</div>
  </div>

  <div class="cta-outer" id="elCta">
    <button class="cta-btn" onclick="startFunnel()">
      <div class="cta-inner">
        Commencer ma demande <em class="cta-arrow">→</em>
      </div>
    </button>
  </div>

  <div class="cta-note" id="elNote">
    <span>30 secondes</span>
    <span class="dot-sep"></span>
    <span>Gratuit</span>
    <span class="dot-sep"></span>
    <span>Sans engagement</span>
  </div>

  <div class="cta-urgency-note" id="elUrgencyNote"></div>

  <div class="funnel" id="funnel">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-lbl" id="progLbl">Étape 1 sur 4</div>
    </div>
    <div id="mount" style="width:100%"></div>
  </div>

</div>

<script>
/* URGENCY ROTATOR */
const msgs = [
  "12 demandes envoyées aujourd'hui à Sherbrooke",
  "3 couvreurs ont répondu dans la dernière heure",
  "7 propriétaires ont trouvé leur couvreur cette semaine",
  "5 demandes actives présentement à Sherbrooke",
];
let mIdx = 0;
setInterval(()=>{
  mIdx = (mIdx+1)%msgs.length;
  const el = document.getElementById('uText');
  el.style.opacity='0';
  setTimeout(()=>{
    el.textContent=msgs[mIdx];
    el.style.opacity='1';
    el.style.transition='opacity .4s';
  }, 260);
}, 4200);

/* FUNNEL */
function g(id){ return document.getElementById(id); }

const state={};
let step=0;
const STEPS=[
  {key:'travaux',q:'Quel type de travaux?',type:'tiles',options:[
    {val:'Remplacement complet',ico:'🏠',lbl:'Remplacement',sub:'Nouvelle toiture'},
    {val:'Réparation',ico:'🩹',lbl:'Réparation',sub:'Fuite ou bardeaux'},
    {val:'Inspection / devis',ico:'🔍',lbl:'Inspection',sub:'Évaluation gratuite'},
    {val:'Autre',ico:'💬',lbl:'Autre',sub:'Je vais préciser'},
  ]},
  {key:'urgence',q:"C'est pour quand?",type:'tiles3',options:[
    {val:'Urgent',ico:'🚨',lbl:'Urgent',sub:'Dès que possible'},
    {val:'Prochaines semaines',ico:'📅',lbl:'2–4 semaines',sub:'Planifié bientôt'},
    {val:'Je planifie',ico:'🗓️',lbl:'Je planifie',sub:'Pas de rush'},
  ]},
  {key:'prenom',q:'Votre prénom?',type:'input',inputType:'text',placeholder:'Ex: Marie',next:'Continuer →'},
  {key:'contact',q:'Comment vous rejoindre?',type:'contact',next:'Recevoir mes soumissions →'},
];

function startFunnel(){
  ['elBrand','elUrgency','elHero','elDiagram','elReview','elCta','elNote','elUrgencyNote'].forEach(id=>g(id).style.display='none');
  g('funnel').style.display='flex';
  render();
}
function pct(){ return Math.round((step/STEPS.length)*100); }

function backBtn(){
  if(step===0) return '';
  return `<button class="back" type="button" onclick="goBack()">← Retour</button>`;
}

function render(){
  g('progFill').style.width=pct()+'%';
  g('progLbl').textContent='Étape '+(step+1)+' sur '+STEPS.length;
  const mount=g('mount');

  if(step>=STEPS.length){
    g('progFill').closest('.prog-wrap').style.display='none';
    mount.innerHTML=`<div class="success"><div class="s-ring"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><h2>Demande envoyée</h2><p>Les meilleurs couvreurs de Sherbrooke vont vous contacter sous peu.</p></div>`;
    return;
  }

  g('progFill').closest('.prog-wrap').style.display='block';

  const s=STEPS[step];
  let html=`<div class="q">${s.q}</div>`;

  if(s.type==='tiles'){
    html+=`<div class="tiles" id="tiles">`;
    s.options.forEach((o,i)=>{
      const isOn = state[s.key]===o.val ? ' on' : '';
      html+=`<button class="tile${isOn}" type="button" onclick="pick(${i})"><span class="ico">${o.ico}</span><span class="lbl">${o.lbl}</span><span class="sub">${o.sub}</span></button>`;
    });
    html+=`</div>`;

    if(state[s.key]==='Autre'){
      html+=`<textarea class="big-textarea" id="autreTxt" placeholder="Décrivez brièvement votre problème...">${state.autreDetails||''}</textarea>`;
    }

    html+=`<button class="next" id="nb" ${state[s.key] ? '' : 'disabled'} onclick="advance()">Continuer →</button>`;
    html+=backBtn();
  }

  if(s.type==='tiles3'){
    html+=`<div class="tiles three" id="tiles">`;
    s.options.forEach((o,i)=>{
      const isOn = state[s.key]===o.val ? ' on' : '';
      html+=`<button class="tile${isOn}" type="button" onclick="pick(${i})"><span class="ico">${o.ico}</span><span class="lbl">${o.lbl}</span><span class="sub">${o.sub}</span></button>`;
    });
    html+=`</div><button class="next" id="nb" ${state[s.key] ? '' : 'disabled'} onclick="advance()">Continuer →</button>`;
    html+=backBtn();
  }

  if(s.type==='input'){
    html+=`<input class="big-input" id="inp" type="${s.inputType}" placeholder="${s.placeholder}" autocomplete="given-name" value="${state[s.key] || ''}">`;
    html+=`<button class="next" id="nb" onclick="advInput()">${s.next}</button>`;
    html+=backBtn();
  }

  if(s.type==='contact'){
    html+=`<div style="display:flex;flex-direction:column;gap:10px">
      <input class="big-input" id="tel" type="tel" placeholder="Téléphone" autocomplete="tel" value="${state.telephone || ''}">
      <input class="big-input" id="em" type="email" placeholder="Courriel" autocomplete="email" value="${state.courriel || ''}">
    </div>
    <div class="consent-row">
      <input type="checkbox" id="ok" ${state.confirmation==='oui' ? 'checked' : ''}>
      <label for="ok">J'accepte que ma demande soit transmise à des couvreurs vérifiés de ma région.</label>
    </div>`;
    html+=`<button class="next" id="nb" onclick="advContact()">${s.next}</button>`;
    html+=backBtn();
    html+=`<div class="gbadge-sm"><img src="media/google.png" alt="Google"><span class="stars">★★★★★</span><span class="txt">4.9 · 94 avis Google</span></div>`;
  }

  const div=document.createElement('div');
  div.className='step';
  div.innerHTML=html;
  mount.innerHTML='';
  mount.appendChild(div);

  if(s.type==='input'){
    const i=g('inp');
    i.focus();
    i.addEventListener('keydown',e=>{if(e.key==='Enter')advInput();});
  }

  if(s.type==='contact'){
    g('tel').focus();
  }

  if(s.type==='tiles' && state[s.key]==='Autre' && g('autreTxt')){
    g('autreTxt').focus();
  }
}

function pick(i){
  const current = STEPS[step];
  document.querySelectorAll('.tile').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tile')[i].classList.add('on');
  state[current.key]=current.options[i].val;

  if(current.key==='travaux'){
    if(state[current.key] === 'Autre'){
      render();
      return;
    }else{
      delete state.autreDetails;
    }
  }

  g('nb').disabled=false;
}

function goBack(){
  if(step>0){
    step--;
    render();
  }
}

function advance(){
  if(STEPS[step].key==='travaux' && state.travaux==='Autre'){
    const txt = g('autreTxt') ? g('autreTxt').value.trim() : '';
    if(!txt){
      if(g('autreTxt')) g('autreTxt').focus();
      return;
    }
    state.autreDetails = txt;
  }
  step++;
  render();
}

function advInput(){
  const v=g('inp').value.trim();
  if(!v){ g('inp').focus(); return; }
  state[STEPS[step].key]=v;
  step++;
  render();
}

async function advContact(){
  const tel=g('tel').value.trim(), email=g('em').value.trim(), ok=g('ok').checked;
  if(!tel||!email){ alert('Remplissez téléphone et courriel.'); return; }
  if(!ok){ alert('Veuillez cocher la case.'); return; }

  state.telephone=tel;
  state.courriel=email;
  state.ville='Sherbrooke';
  state.confirmation='oui';

  const btn=g('nb');
  btn.disabled=true;
  btn.textContent='Envoi en cours…';

  let travauxWebhook = state.travaux || '';

  if(state.travaux === 'Remplacement complet'){
    travauxWebhook = 'Remplacement complet de toiture';
  }else if(state.travaux === 'Réparation'){
    travauxWebhook = 'Réparation de toiture';
  }else if(state.travaux === 'Inspection / devis'){
    travauxWebhook = 'Inspection de toiture / demande de devis';
  }else if(state.travaux === 'Autre'){
    travauxWebhook = state.autreDetails
      ? `Autre problème de toiture : ${state.autreDetails}`
      : 'Autre problème de toiture';
  }

  const payload = {

    courriel: state.courriel || '',

    confirmation: state.confirmation || '',
    autreDetails: state.autreDetails || ''
  };

  try{
    await fetch('https://hook.us2.make.com/to346qlepm88si74k1dngnwnawkd3b79',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
  }catch(e){
    console.error(e);
  }

  window.location.href='https://intermediaire.io/merci';
}
