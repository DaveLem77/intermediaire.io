<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intermediaire.io</title>
  <meta name="description" content="Intermediaire.io aide à trouver le bon service local simplement." />

  <link rel="icon" type="image/png" href="media/logob.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#102334;
      --title:#081a28;
      --accent:#2f80ed;
      --accent2:#6abfff;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;overflow-x:hidden}
    body{
      font-family:Inter,system-ui;
      background:linear-gradient(180deg,#f6fbff 0%,#ffffff 100%);
      color:var(--text);
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:0 20px;
    }

    .hero{
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .heroInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100svh;
    }

    .logo{
      width:150px;
      height:150px;
      margin-bottom:12px;
      animation:float 6s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }

    .brand{
      font-family:"Space Grotesk";
      font-size:clamp(44px,6vw,80px);
      letter-spacing:-0.1em;
      margin:0;
      color:var(--title);
    }

    .heroSub{
      margin-top:14px;
      font-size:20px;
      color:#6c8396;
      max-width:500px;
    }

    .heroMiniLine{
      margin-top:12px;
      font-size:11px;
      letter-spacing:.2em;
      color:#7f94a5;
    }

    .heroActions{
      margin-top:26px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .splitCta{
      min-height:70px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:15px;
      white-space:nowrap;
    }

    .splitLeft{
      background:linear-gradient(135deg,#2f80ed,#6abfff);
      color:#fff;
      border-radius:20px 0 0 20px;
      padding:0 50px 0 30px;
      clip-path:polygon(0 0,100% 0,84% 100%,0 100%);
    }

    .splitRight{
      background:#fff;
      border:1px solid #ddd;
      border-left:none;
      color:var(--title);
      border-radius:0 20px 20px 0;
      padding:0 30px 0 50px;
      margin-left:-20px;
      clip-path:polygon(16% 0,100% 0,100% 100%,0 100%);
    }

    .heroScroll{
      margin-top:22px;
      animation:bounce 1.5s infinite;
    }

    .heroScroll span{
      display:block;
      width:12px;
      height:12px;
      border-right:2px solid #555;
      border-bottom:2px solid #555;
      transform:rotate(45deg);
    }

    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(8px)}
    }

    @media(max-width:760px){
      .logo{width:120px;height:120px}
      .heroSub{font-size:17px}
      .splitCta{min-height:64px;font-size:13px}
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="wrap">
      <div class="heroInner">

        <img class="logo" src="media/logob.png" alt="logo">

        <h1 class="brand">Intermediaire.io</h1>

        <p class="heroSub">
          Une seule demande, envoyée aux bons professionnels de votre région.
        </p>

        <div class="heroMiniLine">Simple • rapide • local</div>

        <div class="heroActions">
          <a class="splitCta splitLeft">Je cherche un service</a>
          <a class="splitCta splitRight">Je suis entrepreneur</a>
        </div>

        <div class="heroScroll">
          <span></span>
        </div>

      </div>
    </div>
  </section>
</body>
</html>
