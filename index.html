<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Météo Edge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--bg4:#48484a;
  --text:#fff;--muted:#8e8e93;--muted2:#48484a;
  --green:#30d158;--green-b:rgba(48,209,88,0.25);--green-dim:rgba(48,209,88,0.1);
  --red:#ff453a;--red-dim:rgba(255,69,58,0.12);--red-b:rgba(255,69,58,0.3);
  --amber:#ffd60a;--amber-b:rgba(255,214,10,0.25);--amber-dim:rgba(255,214,10,0.1);
  --blue:#0a84ff;--blue-dim:rgba(10,132,255,0.12);
  --r:14px;--r2:10px;--r3:8px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100dvh;max-width:430px;margin:0 auto;padding-bottom:48px}
#pin-screen{position:fixed;inset:0;max-width:430px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;z-index:999}
.pin-icon{width:60px;height:60px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px}
.pin-title{font-size:18px;font-weight:600}
.dots{display:flex;gap:14px}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--muted2);transition:all .15s}
.dot.on{background:var(--blue);border-color:var(--blue)}.dot.err{background:var(--red);border-color:var(--red)}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:270px}
.key{height:58px;background:var(--bg2);border:none;border-radius:var(--r2);font-size:20px;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif}
.key:active{background:var(--bg4)}.key.sym{font-size:16px;color:var(--muted)}
.pin-err{font-size:12px;color:var(--red);height:16px;text-align:center}
#app{display:none}#app.on{display:block}
.header{padding:48px 20px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.h-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
.h-sub{font-size:12px;color:var(--muted);margin-top:3px}
.scan-btn{background:var(--blue);border:none;border-radius:var(--r2);padding:10px 16px;color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap}
.scan-btn:active{transform:scale(.95)}.scan-btn:disabled{opacity:.4;cursor:not-allowed}
.prog{background:var(--bg2);border-radius:var(--r2);padding:12px 16px;margin:0 16px 12px;display:none}
.prog.on{display:block}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:7px}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;width:0%;transition:width .3s}
.prog-txt{font-size:11px;color:var(--muted)}
.prog-sub{font-size:10px;color:var(--muted2);margin-top:3px}
.summary{display:none;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin-bottom:14px}
.summary.on{display:grid}
.sc{background:var(--bg2);border-radius:var(--r3);padding:10px;text-align:center}
.sc-v{font-size:20px;font-weight:700;line-height:1;margin-bottom:2px}
.sc-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.filters{display:none;gap:6px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.filters.on{display:flex}.filters::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:5px 13px;border-radius:20px;border:none;font-size:12px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;background:var(--bg2);color:var(--muted)}
.ftab.on{background:var(--blue);color:#fff}
.bets{padding:0 16px}
.last-up{font-size:10px;color:var(--muted2);text-align:center;margin-bottom:12px}
.total-box{background:var(--green-dim);border:.5px solid var(--green-b);border-radius:var(--r2);padding:12px 14px;margin-bottom:16px}
.total-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.total-val{font-size:28px;font-weight:700;color:var(--green)}
.total-sub{font-size:11px;color:var(--muted);margin-top:2px}
.day-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 10px;padding:0 2px}
.bet{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;border:.5px solid transparent;position:relative;overflow:hidden}
.bet.strong{border-color:var(--green-b)}.bet.moderate{border-color:var(--amber-b)}
.etop{position:absolute;top:0;left:0;right:0;height:3px}
.etop.green{background:var(--green)}.etop.amber{background:var(--amber)}
.vbanner{border-radius:var(--r3);padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.vbanner.strong{background:var(--green-dim);border:.5px solid var(--green-b)}
.vbanner.moderate{background:var(--amber-dim);border:.5px solid var(--amber-b)}
.v-icon{font-size:18px;flex-shrink:0}
.v-title{font-size:13px;font-weight:600}
.v-sub{font-size:11px;color:var(--muted);margin-top:1px}
.bet-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.bet-city{font-size:15px;font-weight:600}
.bet-meta{font-size:11px;color:var(--muted);margin-top:2px}
.edge-blk{text-align:right;flex-shrink:0}
.edge-n{font-size:26px;font-weight:700;line-height:1}
.edge-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.st{background:var(--bg3);border-radius:var(--r3);padding:7px 9px}
.st-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.st-v{font-size:14px;font-weight:600}
.cg{color:var(--green)}.cr{color:var(--red)}.ca{color:var(--amber)}.cb{color:var(--blue)}
.kelly-box{border-radius:var(--r3);padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.kelly-box.strong{background:var(--green-dim);border:.5px solid var(--green-b)}
.kelly-box.moderate{background:var(--amber-dim);border:.5px solid var(--amber-b)}
.k-label{font-size:11px;color:var(--muted)}
.k-note{font-size:10px;color:var(--muted2);margin-top:2px}
.k-amount{font-size:24px;font-weight:700}
.k-amount.strong{color:var(--green)}.k-amount.moderate{color:var(--amber)}
.ai-box{font-size:11px;color:#bbb;line-height:1.65;padding:10px 11px;background:var(--bg3);border-radius:var(--r3);margin-bottom:10px}
.ai-box.loading{color:var(--muted2);font-style:italic;display:flex;align-items:center;gap:6px}
.act-btn{display:block;width:100%;padding:13px;border-radius:var(--r2);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;text-align:center;text-decoration:none;border:none;transition:all .15s;cursor:pointer}
.act-btn:active{transform:scale(.97)}
.act-btn.strong{background:var(--green);color:#000}
.act-btn.moderate{background:var(--amber-dim);color:var(--amber);border:.5px solid var(--amber-b)}
.no-market{background:var(--bg2);border-radius:var(--r3);padding:12px 14px;margin-bottom:10px;font-size:12px;color:var(--muted);text-align:center}
.disclaimer{font-size:10px;color:var(--muted2);text-align:center;padding:8px 16px 0;line-height:1.5}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid var(--muted2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}.spin.b{border-top-color:var(--blue)}
</style>
</head>
<body>
<div id="pin-screen">
  <div class="pin-icon">🌤</div>
  <div class="pin-title">Météo Edge</div>
  <div class="dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
  <div class="pad">
    <button class="key" onclick="kp('1')">1</button><button class="key" onclick="kp('2')">2</button><button class="key" onclick="kp('3')">3</button>
    <button class="key" onclick="kp('4')">4</button><button class="key" onclick="kp('5')">5</button><button class="key" onclick="kp('6')">6</button>
    <button class="key" onclick="kp('7')">7</button><button class="key" onclick="kp('8')">8</button><button class="key" onclick="kp('9')">9</button>
    <button class="key sym" onclick="kp('del')">⌫</button><button class="key" onclick="kp('0')">0</button>
    <button class="key" style="visibility:hidden"></button>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>

<div id="app">
  <div class="header">
    <div><div class="h-title">Météo Edge</div><div class="h-sub">Aujourd'hui + demain · Kelly sizing</div></div>
    <button class="scan-btn" id="scan-btn" onclick="runScan()">↻ Scanner</button>
  </div>
  <div class="prog" id="prog">
    <div class="prog-bar"><div class="prog-fill" id="pfill"></div></div>
    <div class="prog-txt" id="ptxt">...</div>
    <div class="prog-sub" id="psub"></div>
  </div>
  <div class="summary" id="sum">
    <div class="sc"><div class="sc-v cg" id="s1">0</div><div class="sc-l">Fort ✓</div></div>
    <div class="sc"><div class="sc-v ca" id="s2">0</div><div class="sc-l">Modéré</div></div>
    <div class="sc"><div class="sc-v cb" id="s3">0</div><div class="sc-l">Scannés</div></div>
  </div>
  <div class="filters" id="filters">
    <button class="ftab on" onclick="setF('all',this)">Tous</button>
    <button class="ftab" onclick="setF('strong',this)">Fort</button>
    <button class="ftab" onclick="setF('today',this)">Aujourd'hui</button>
    <button class="ftab" onclick="setF('tomorrow',this)">Demain</button>
  </div>
  <div class="bets" id="bets-container">
    <div style="text-align:center;padding:48px 20px;color:var(--muted2);font-size:13px;line-height:1.7">
      Appuie sur <strong>Scanner</strong> — aujourd'hui + demain, toutes les villes, décision + montant exact.
    </div>
  </div>
  <div class="disclaimer">Edge réel ~60-65% de succès. Kelly 25% conservateur. Capital: $100.</div>
</div>

<script>
const PIN='2788', SK='pme_v11';
const PROXY='https://square-union-05ed.dlemieux730.workers.dev';
const CLAUDE='https://api.anthropic.com/v1/messages';
const METEO='https://api.open-meteo.com/v1/forecast';
const CAPITAL=100;

const CITIES=[
  {name:'Seoul',slug:'seoul',flag:'🇰🇷',lat:37.57,lon:126.98},
  {name:'Shanghai',slug:'shanghai',flag:'🇨🇳',lat:31.23,lon:121.47},
  {name:'Hong Kong',slug:'hong-kong',flag:'🇭🇰',lat:22.32,lon:114.17},
  {name:'Tokyo',slug:'tokyo',flag:'🇯🇵',lat:35.68,lon:139.65},
  {name:'Chicago',slug:'chicago',flag:'🇺🇸',lat:41.88,lon:-87.63},
  {name:'New York',slug:'new-york',flag:'🇺🇸',lat:40.71,lon:-74.01},
  {name:'Los Angeles',slug:'los-angeles',flag:'🇺🇸',lat:34.05,lon:-118.24},
  {name:'London',slug:'london',flag:'🇬🇧',lat:51.51,lon:-0.13},
  {name:'Paris',slug:'paris',flag:'🇫🇷',lat:48.86,lon:2.35},
  {name:'Dubai',slug:'dubai',flag:'🇦🇪',lat:25.20,lon:55.27},
  {name:'Singapore',slug:'singapore',flag:'🇸🇬',lat:1.35,lon:103.82},
  {name:'Sydney',slug:'sydney',flag:'🇦🇺',lat:-33.87,lon:151.21},
  {name:'Toronto',slug:'toronto',flag:'🇨🇦',lat:43.65,lon:-79.38},
  {name:'Miami',slug:'miami',flag:'🇺🇸',lat:25.76,lon:-80.19},
  {name:'Berlin',slug:'berlin',flag:'🇩🇪',lat:52.52,lon:13.41},
  {name:'Beijing',slug:'beijing',flag:'🇨🇳',lat:39.90,lon:116.41},
  {name:'Mumbai',slug:'mumbai',flag:'🇮🇳',lat:19.08,lon:72.88},
  {name:'Bangkok',slug:'bangkok',flag:'🇹🇭',lat:13.76,lon:100.50},
  {name:'Taipei',slug:'taipei',flag:'🇹🇼',lat:25.03,lon:121.57},
  {name:'Jakarta',slug:'jakarta',flag:'🇮🇩',lat:-6.21,lon:106.85},
  {name:'Moscow',slug:'moscow',flag:'🇷🇺',lat:55.76,lon:37.62},
  {name:'Guangzhou',slug:'guangzhou',flag:'🇨🇳',lat:23.13,lon:113.26},
  {name:'Houston',slug:'houston',flag:'🇺🇸',lat:29.76,lon:-95.37},
  {name:'Dallas',slug:'dallas',flag:'🇺🇸',lat:32.78,lon:-96.80},
  {name:'Phoenix',slug:'phoenix',flag:'🇺🇸',lat:33.45,lon:-112.07},
  {name:'Amsterdam',slug:'amsterdam',flag:'🇳🇱',lat:52.37,lon:4.90},
  {name:'Madrid',slug:'madrid',flag:'🇪🇸',lat:40.42,lon:-3.70},
  {name:'Istanbul',slug:'istanbul',flag:'🇹🇷',lat:41.01,lon:28.96},
  {name:'Kuala Lumpur',slug:'kuala-lumpur',flag:'🇲🇾',lat:3.14,lon:101.69},
  {name:'Manila',slug:'manila',flag:'🇵🇭',lat:14.60,lon:120.98},
];

function buildSlug(s,o){
  const d=new Date();d.setDate(d.getDate()+o);
  const m=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return`highest-temperature-in-${s}-on-${m[d.getMonth()]}-${d.getDate()}-${d.getFullYear()}`;
}
function fmtDate(o){
  const d=new Date();d.setDate(d.getDate()+o);
  const m=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const j=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  return`${j[d.getDay()]} ${d.getDate()} ${m[d.getMonth()]}`;
}

let pinBuf='',activeFilter='all';
let S={bets:[],lastScan:null};
let allBets=[];

function loadS(){try{const d=localStorage.getItem(SK);if(d){S={...S,...JSON.parse(d)};allBets=S.bets||[];}}catch(e){}}
function saveS(){try{S.bets=allBets;localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

function kp(v){
  if(v==='del') pinBuf=pinBuf.slice(0,-1);
  else if(pinBuf.length<4) pinBuf+=v;
  for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.classList.toggle('on',i<pinBuf.length);d.classList.remove('err');}
  if(pinBuf.length===4){
    if(pinBuf===PIN){setTimeout(()=>{document.getElementById('pin-screen').style.display='none';document.getElementById('app').classList.add('on');init();},150);}
    else{document.querySelectorAll('.dot').forEach(d=>d.classList.add('err'));document.getElementById('pin-err').textContent='Code incorrect';setTimeout(()=>{pinBuf='';document.querySelectorAll('.dot').forEach(d=>d.classList.remove('err','on'));document.getElementById('pin-err').textContent='';},800);}
  }
}
function setF(f,btn){activeFilter=f;document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');renderBets();}
function setP(p,t,sub=''){document.getElementById('pfill').style.width=p+'%';document.getElementById('ptxt').textContent=t;document.getElementById('psub').textContent=sub;}

async function fetchPoly(slug){
  try{
    const r=await fetch(`${PROXY}/?slug=${slug}`);
    if(!r.ok) return null;
    const d=await r.json();
    // Vérifie que le marché est encore actif (pas fermé)
    if(Array.isArray(d)&&d.length){
      const ev=d[0];
      if(ev.closed||ev.archived) return null;
      return ev;
    }
    return null;
  }catch(e){return null;}
}

async function fetchWeather(lat,lon,o){
  const r=await fetch(`${METEO}?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=${o+2}`);
  const d=await r.json();
  return{
    max:Math.round(d.daily.temperature_2m_max[o]),
    min:Math.round(d.daily.temperature_2m_min[o]),
    rain:d.daily.precipitation_probability_max[o]||0
  };
}

function kellyBet(prob,polyOdds){
  if(polyOdds<=0||polyOdds>=100) return 0;
  const p=prob/100,q=1-p;
  const b=(100/polyOdds)-1;
  const k=Math.max(0,(p*b-q)/b)*0.25;
  return Math.min(Math.round(k*CAPITAL*100)/100,10);
}

function realProb(realMax,threshold,isAbove,isBelow){
  if(isAbove){
    const d=realMax-threshold;
    return d>=3?93:d>=2?82:d>=1?68:d===0?52:d>=-1?32:d>=-2?18:8;
  }
  if(isBelow){
    const d=threshold-realMax;
    return d>=3?93:d>=2?82:d>=1?68:d===0?52:d>=-1?32:d>=-2?18:8;
  }
  const d=Math.abs(realMax-threshold);
  return d===0?62:d===1?22:d===2?7:2;
}

function findBestBet(markets,realMax){
  let best=null;
  for(const m of markets){
    if(!m.active||m.closed) continue;
    const title=m.groupItemTitle||'';
    const nm=title.match(/(\d+)/);
    if(!nm) continue;
    const threshold=parseInt(nm[1]);
    const isAbove=title.toLowerCase().includes('or higher');
    const isBelow=title.toLowerCase().includes('or below');

    let polyYes=50;
    if(m.lastTradePrice&&parseFloat(m.lastTradePrice)>0) polyYes=Math.round(parseFloat(m.lastTradePrice)*100);
    else if(m.bestBid&&m.bestAsk) polyYes=Math.round(((parseFloat(m.bestBid)+parseFloat(m.bestAsk))/2)*100);
    else if(m.outcomePrices){try{const p=typeof m.outcomePrices==='string'?JSON.parse(m.outcomePrices):m.outcomePrices;const v=parseFloat(p[0]);if(v>0&&v<1)polyYes=Math.round(v*100);}catch(e){}}

    if(polyYes<=0||polyYes>=100) continue;

    const rProb=realProb(realMax,threshold,isAbove,isBelow);
    const edge=rProb-polyYes;
    const absEdge=Math.abs(edge);
    const direction=edge>0?'YES':'NO';
    const vol=Math.round(parseFloat(m.volume24hr||0));

    // Edge >= 12%, volume < $150K
    if(absEdge>=12&&vol<150000){
      const kelly=kellyBet(rProb,polyYes);
      if(kelly>0&&(!best||absEdge>Math.abs(best.edge))){
        best={threshold,isAbove,isBelow,polyYes,rProb,edge:absEdge,direction,kelly,vol,
          marketUrl:`https://polymarket.com/event/${m.slug||''}`,
          strength:absEdge>=22?'strong':'moderate'};
      }
    }
  }
  return best;
}

async function askClaude(b){
  try{
    const typeLabel=b.isAbove?`${b.threshold}°C ou plus`:b.isBelow?`${b.threshold}°C ou moins`:`exactement ${b.threshold}°C`;
    const r=await fetch(CLAUDE,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:`Expert météo Polymarket. 2 phrases max, français, direct.
${b.flag} ${b.city} · ${b.dateLabel} · Temp max ${typeLabel}
Météo Open-Meteo: ${b.realMax}°C · Pluie: ${b.rain}% · Volume marché: $${b.vol.toLocaleString()}
Cote Poly YES: ${b.polyYes}% · Prob réelle: ${b.rProb}% · Edge: +${b.edge}% · Parier ${b.direction} · $${b.kelly}
Confirme si justifié. Risque principal en 1 phrase.`}]})});
    const d=await r.json();
    return d.content?.[0]?.text||'';
  }catch(e){return '';}
}

async function runScan(){
  const btn=document.getElementById('scan-btn');
  btn.disabled=true;btn.textContent='Scan...';
  document.getElementById('prog').classList.add('on');
  document.getElementById('bets-container').innerHTML='';
  document.getElementById('filters').classList.remove('on');
  document.getElementById('sum').classList.remove('on');
  allBets=[];

  let strong=0,moderate=0,scanned=0;
  document.getElementById('sum').classList.add('on');

  // Aujourd'hui (offset 0) ET demain (offset 1)
  for(const offset of[0,1]){
    const dateLabel=fmtDate(offset);
    for(let ci=0;ci<CITIES.length;ci++){
      const city=CITIES[ci];
      const pct=Math.round((offset*CITIES.length+ci)/(2*CITIES.length)*76);
      setP(pct,`${city.flag} ${city.name} · ${dateLabel}`,`${scanned} analysés`);
      try{
        const slug=buildSlug(city.slug,offset);
        const[event,weather]=await Promise.all([
          fetchPoly(slug),
          fetchWeather(city.lat,city.lon,offset)
        ]);
        scanned++;
        document.getElementById('s3').textContent=scanned;

        if(!event?.markets?.length) continue;

        const best=findBestBet(event.markets,weather.max);
        if(best){
          if(best.strength==='strong')strong++;else moderate++;
          allBets.push({
            city:city.name,flag:city.flag,dateLabel,offset,
            ...best,realMax:weather.max,realMin:weather.min,rain:weather.rain,ai:''
          });
          allBets.sort((a,b)=>{
            if(a.strength!==b.strength) return a.strength==='strong'?-1:1;
            return b.edge-a.edge;
          });
          document.getElementById('s1').textContent=strong;
          document.getElementById('s2').textContent=moderate;
          renderBets();
          document.getElementById('filters').classList.add('on');
        }
      }catch(e){}
      await new Promise(r=>setTimeout(r,80));
    }
  }

  // Analyse IA sur tous les bets
  setP(78,`Analyse IA · ${allBets.length} bet${allBets.length>1?'s':''}...`,'');
  for(let i=0;i<allBets.length;i++){
    const ai=await askClaude(allBets[i]);
    if(ai){allBets[i].ai=ai;renderBets();}
    setP(78+(i+1)/allBets.length*22,`IA ${i+1}/${allBets.length}...`,'');
    await new Promise(r=>setTimeout(r,250));
  }

  if(!allBets.length){
    document.getElementById('bets-container').innerHTML=`
      <div style="text-align:center;padding:32px 20px;color:var(--muted2);font-size:13px;line-height:1.7">
        ✅ Aucun edge significatif aujourd'hui et demain.<br>
        Les marchés d'aujourd'hui ferment à 12h UTC.<br>
        Reviens demain matin pour les nouveaux marchés.
      </div>`;
  }

  const totalKelly=allBets.reduce((a,b)=>a+b.kelly,0);
  setP(100,allBets.length?`✓ ${allBets.length} bet${allBets.length>1?'s':''} · Total suggéré $${totalKelly.toFixed(2)}`:'Aucun bet aujourd\'hui');
  S.lastScan=new Date().toISOString();
  saveS();
  setTimeout(()=>document.getElementById('prog').classList.remove('on'),2500);
  btn.disabled=false;btn.textContent='↻ Scanner';
}

function renderBets(){
  const container=document.getElementById('bets-container');
  let bets=[...allBets];
  if(activeFilter==='strong') bets=bets.filter(b=>b.strength==='strong');
  else if(activeFilter==='today') bets=bets.filter(b=>b.offset===0);
  else if(activeFilter==='tomorrow') bets=bets.filter(b=>b.offset===1);
  if(!bets.length){container.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted2);font-size:13px">Aucun bet avec ce filtre.</div>';return;}

  const totalKelly=bets.reduce((a,b)=>a+b.kelly,0);
  const lastUp=S.lastScan?'Mis à jour '+new Date(S.lastScan).toLocaleString('fr-CA',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'}):'';

  const todayBets=bets.filter(b=>b.offset===0);
  const tomorrowBets=bets.filter(b=>b.offset===1);

  function renderBetCard(b,i){
    const typeLabel=b.isAbove?`≥${b.threshold}°C`:b.isBelow?`≤${b.threshold}°C`:`=${b.threshold}°C`;
    const ec=b.strength==='strong'?'cg':'ca';
    const icon=b.strength==='strong'?'✅':'⚡';
    const strengthLabel=b.strength==='strong'?'Fort edge':'Edge modéré';
    const aiHtml=b.ai
      ?`<div class="ai-box">${b.ai}</div>`
      :`<div class="ai-box loading"><span class="spin b"></span>&nbsp;Analyse IA...</div>`;
    return`<div class="bet ${b.strength}">
      <div class="etop ${b.strength==='strong'?'green':'amber'}"></div>
      <div class="vbanner ${b.strength}">
        <div class="v-icon">${icon}</div>
        <div>
          <div class="v-title">Parier ${b.direction} · ${b.flag} ${b.city}</div>
          <div class="v-sub">Temp max ${typeLabel} · ${strengthLabel}</div>
        </div>
      </div>
      <div class="bet-row">
        <div>
          <div class="bet-city">Météo prévue: ${b.realMax}°C</div>
          <div class="bet-meta">Min: ${b.realMin}°C · Pluie: ${b.rain}% · Vol: $${b.vol.toLocaleString()}</div>
        </div>
        <div class="edge-blk">
          <div class="edge-n ${ec}">+${b.edge}%</div>
          <div class="edge-l">Edge</div>
        </div>
      </div>
      <div class="grid3">
        <div class="st"><div class="st-l">Cote Poly</div><div class="st-v">${b.polyYes}%</div></div>
        <div class="st"><div class="st-l">Prob réelle</div><div class="st-v ${ec}">${b.rProb}%</div></div>
        <div class="st"><div class="st-l">Direction</div><div class="st-v ${b.direction==='YES'?'cg':'cr'}">${b.direction}</div></div>
      </div>
      <div class="kelly-box ${b.strength}">
        <div>
          <div class="k-label">Montant suggéré (Kelly 25%)</div>
          <div class="k-note">Risque max: perdre $${b.kelly.toFixed(2)}</div>
        </div>
        <div class="k-amount ${b.strength}">$${b.kelly.toFixed(2)}</div>
      </div>
      ${aiHtml}
      <a class="act-btn ${b.strength}" href="${b.marketUrl}" target="_blank">
        Parier ${b.direction} $${b.kelly.toFixed(2)} sur Polymarket →
      </a>
    </div>`;
  }

  container.innerHTML=`
    <div class="last-up">${lastUp}</div>
    <div class="total-box">
      <div class="total-lbl">Total à miser aujourd'hui + demain</div>
      <div class="total-val">$${totalKelly.toFixed(2)}</div>
      <div class="total-sub">${bets.length} bet${bets.length>1?'s':''} · Kelly 25% conservateur sur $${CAPITAL}</div>
    </div>
    ${todayBets.length?`<div class="day-label">Aujourd'hui — ${fmtDate(0)}</div>${todayBets.map(renderBetCard).join('')}`:''}
    ${tomorrowBets.length?`<div class="day-label">Demain — ${fmtDate(1)}</div>${tomorrowBets.map(renderBetCard).join('')}`:''}
  `;
}

setInterval(()=>{if(document.getElementById('app').classList.contains('on'))runScan();},3600000);

function init(){
  loadS();
  if(allBets.length){
    renderBets();
    document.getElementById('filters').classList.add('on');
    document.getElementById('sum').classList.add('on');
    document.getElementById('s1').textContent=allBets.filter(b=>b.strength==='strong').length;
    document.getElementById('s2').textContent=allBets.filter(b=>b.strength==='moderate').length;
    document.getElementById('s3').textContent=allBets.length;
  }
  const old=!S.lastScan||Date.now()-new Date(S.lastScan).getTime()>3600000;
  if(old)setTimeout(runScan,800);
}
</script>
</body>
</html>
