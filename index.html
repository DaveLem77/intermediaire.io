<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Intermediaire.io</title>

  <link rel="icon" href="media/logob.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#fbfdff;
      --text:#102334;
      --title:#081a28;
      --muted:#74889a;
      --accent:#2f80ed;
      --accent2:#6abfff;
      --max:1180px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f6fbff 0%,#ffffff 100%);
    }

    .wrap{
      max-width:var(--max);
      margin:auto;
      padding:0 20px;
    }

    /* HEADER FIX */
    .topFade{
      position:absolute;
      inset:0 0 auto 0;
      height:420px;
      pointer-events:none;
      background:
        radial-gradient(900px 420px at 50% -2%, rgba(47,128,237,.14), transparent 62%),
        radial-gradient(500px 220px at 18% 10%, rgba(106,191,255,.10), transparent 72%),
        radial-gradient(500px 220px at 82% 10%, rgba(47,128,237,.07), transparent 72%);
      z-index:0;
    }

    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .heroInner{
      position:relative;
      z-index:2;
      max-width:860px;
      margin:auto;
    }

    .logo{
      width:100px;
      margin:0 auto 20px;
      animation:float 6s ease-in-out infinite;
      filter:drop-shadow(0 14px 30px rgba(47,128,237,.14));
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    .brand{
      font-family:"Space Grotesk";
      font-size:clamp(44px,6vw,82px);
      letter-spacing:-0.11em;
      margin:0;
      color:var(--title);
    }

    .heroSub{
      margin-top:18px;
      font-size:22px;
      font-weight:600;
      color:#6c8396;
      line-height:1.4;
    }

    .heroSub strong{
      font-weight:800;
      color:var(--title);
    }

    .heroMiniLine{
      margin-top:14px;
      color:#7f94a5;
      font-size:12px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .heroActions{
      margin-top:30px;
      display:flex;
      justify-content:center;
      gap:0;
    }

    .splitCta{
      padding:16px 28px;
      font-weight:800;
      text-decoration:none;
    }

    .splitLeft{
      background:linear-gradient(135deg,#2f80ed,#6abfff);
      color:#fff;
      border-radius:20px 0 0 20px;
    }

    .splitRight{
      background:#fff;
      border:1px solid #ddd;
      border-left:none;
      border-radius:0 20px 20px 0;
    }

    /* FORM (inchangé) */
    .section{padding:60px 0}

    .clientGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:40px;
    }

    input,textarea{
      width:100%;
      padding:12px;
      margin-bottom:10px;
      border:none;
      border-bottom:1px solid #ccc;
    }

    button{
      padding:14px;
      border:none;
      background:linear-gradient(135deg,#2f80ed,#6abfff);
      color:#fff;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    footer{
      padding:40px;
      text-align:center;
      color:#7a90a3;
    }

    @media(max-width:800px){
      .clientGrid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="topFade"></div>

<section class="hero">
  <div class="wrap">
    <div class="heroInner">

      <img class="logo" src="media/logob.png">

      <h1 class="brand">Intermediaire.io</h1>

      <p class="heroSub">
        <strong>Une seule demande, envoyée aux bons professionnels de votre région.</strong>
      </p>

      <div class="heroMiniLine">
        SIMPLE • RAPIDE • LOCAL
      </div>

      <div class="heroActions">
        <a class="splitCta splitLeft" href="#client">Je cherche un service</a>
        <a class="splitCta splitRight" href="#entrepreneur">Je suis entrepreneur</a>
      </div>

    </div>
  </div>
</section>

<section id="client" class="section">
  <div class="wrap">
    <h2>Faire une demande</h2>

    <div class="clientGrid">
      <form action="https://hook.us2.make.com/to346qlepm88si74k1dngnwnawkd3b79" method="post">

        <input type="text" name="nom" placeholder="Nom complet" required>
        <input type="text" name="ville" placeholder="Ville" required>
        <input type="tel" name="telephone" placeholder="Téléphone" required>
        <input type="email" name="courriel" placeholder="Courriel" required>

        <textarea name="besoin" placeholder="Votre besoin..." required></textarea>

        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>
</section>

<footer>
© 2026 Intermediaire.io
</footer>

</body>
</html>
