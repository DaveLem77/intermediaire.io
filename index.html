<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intermediaire.io</title>
  <meta name="description" content="Intermediaire.io aide à trouver le bon service local simplement." />
  <meta name="robots" content="index,follow" />

  <link rel="icon" type="image/png" href="media/logob.png" />
  <link rel="apple-touch-icon" href="media/logob.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#102334;
      --title:#081a28;
      --accent:#2f80ed;
      --accent2:#6abfff;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;overflow-x:hidden;scroll-behavior:smooth}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f6fbff 0%,#fbfdff 22%,#ffffff 100%);
    }

    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}

    .site{
      position:relative;
      min-height:100vh;
    }

    .topFade{
      position:absolute;
      inset:0 0 auto 0;
      height:300px;
      pointer-events:none;
      background:
        radial-gradient(900px 420px at 50% -2%, rgba(47,128,237,.14), transparent 62%),
        radial-gradient(500px 220px at 18% 10%, rgba(106,191,255,.10), transparent 72%),
        radial-gradient(500px 220px at 82% 10%, rgba(47,128,237,.07), transparent 72%);
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:var(--max);
      margin:0 auto;
      padding:0 26px;
    }

    .hero{
      min-height:100svh;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      text-align:center;
      padding:0;
    }

    .heroInner{
      width:100%;
      max-width:860px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:100svh;
      padding-top:40px;
    }

    .logo{
      width:156px;
      height:156px;
      object-fit:contain;
      margin:0 auto 14px;
      filter:drop-shadow(0 14px 30px rgba(47,128,237,.14));
      animation:logoFloat 6s ease-in-out infinite;
    }

    @keyframes logoFloat{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-4px)}
    }

    .brand{
      margin:0;
      font-family:"Space Grotesk", Inter, sans-serif;
      font-size:clamp(44px,6.2vw,82px);
      font-weight:700;
      letter-spacing:-0.11em;
      line-height:.9;
      color:var(--title);
      text-rendering:geometricPrecision;
    }

    .heroSub{
      margin:18px auto 0;
      max-width:720px;
      font-size:clamp(18px,2.1vw,24px);
      line-height:1.35;
      font-weight:600;
      color:#6c8396;
    }

    .heroMiniLine{
      margin-top:14px;
      color:#7f94a5;
      font-size:12px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
    }

    .heroActions{
      margin:28px auto 0;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:0;
      flex-wrap:nowrap;
      width:auto;
      max-width:none;
      padding:0;
      filter:drop-shadow(0 16px 28px rgba(47,128,237,.12));
    }

    .splitCta{
      position:relative;
      min-height:88px; /* ajusté */
      font-size:16px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      white-space:normal;
      text-align:center;
    }

    .splitCta span{
      display:block;
      line-height:1.2;
    }

    .splitCta:hover{
      transform:translateY(-2px);
    }

    .splitLeft{
      background:linear-gradient(135deg,#2f80ed 0%,#56a8ff 58%,#79c6ff 100%);
      color:#fff;
      border-radius:20px 0 0 20px;
      clip-path:polygon(0 0, 100% 0, 84% 100%, 0 100%);
      padding:0 52px 0 34px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 14px 26px rgba(47,128,237,.20);
    }

    .splitRight{
      background:#fff;
      color:var(--title);
      border:1px solid rgba(8,26,40,.10);
      border-left:none;
      border-radius:0 20px 20px 0;
      clip-path:polygon(16% 0, 100% 0, 100% 100%, 0 100%);
      padding:0 34px 0 52px;
      margin-left:-22px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 14px 26px rgba(16,36,53,.08);
    }

    .heroScroll{
      margin-top:20px;
      width:34px;
      height:34px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      animation:arrowBounce 1.5s ease-in-out infinite;
    }

    .heroScroll span{
      width:12px;
      height:12px;
      display:block;
      border-right:2px solid rgba(8,26,40,.45);
      border-bottom:2px solid rgba(8,26,40,.45);
      transform:rotate(45deg);
    }

    @keyframes arrowBounce{
      0%,100%{transform:translateY(0);opacity:.7}
      50%{transform:translateY(7px);opacity:1}
    }
  </style>
</head>
<body>
  <div class="site">
    <div class="topFade"></div>

    <section class="hero">
      <div class="wrap">
        <div class="heroInner">
          <img class="logo" src="media/logob.png">

          <h1 class="brand">Intermediaire.io</h1>

          <p class="heroSub">
            Ta <strong>demande</strong> est envoyée directement à tous les professionnels de ta région.
          </p>

          <div class="heroMiniLine">Simple • rapide • local</div>

          <div class="heroActions">
            <a class="splitCta splitLeft" href="#">
              <span>Je cherche un service</span>
            </a>

            <a class="splitCta splitRight" href="#">
              <span>Je suis entrepreneur</span>
            </a>
          </div>

          <div class="heroScroll">
            <span></span>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
