<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intermediaire.io | Trouver un service local</title>

  <link rel="icon" href="media/logob.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#102334;
      --title:#081a28;
      --muted:#74889a;
      --accent:#2f80ed;
      --accent2:#6abfff;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Inter, sans-serif;
      background:linear-gradient(180deg,#f6fbff,#ffffff);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:auto;
      padding:0 20px;
    }

    .topFade{
      position:absolute;
      inset:0 0 auto 0;
      height:420px;
      background:
        radial-gradient(900px 420px at 50% -2%, rgba(47,128,237,.14), transparent 62%);
    }

    /* HERO */
    .hero{
      position:relative;
      min-height:100svh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .heroInner{
      width:100%;
      max-width:860px;
      margin:auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .logo{
      width:100px;
      margin-bottom:20px;
      animation:float 6s infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }

    .brand{
      font-family:"Space Grotesk";
      font-size:clamp(44px,6vw,80px);
      letter-spacing:-0.11em;
    }

    .heroSub{
      margin-top:18px;
      font-size:22px;
      color:#6c8396;
    }

    .heroMiniLine{
      margin-top:14px;
      font-size:12px;
      letter-spacing:.16em;
      color:#7f94a5;
    }

    /* BUTTONS */
    .heroActions{
      margin-top:30px;
      display:flex;
      justify-content:center;
      gap:0;
    }

    .splitCta{
      min-height:60px;
      padding:0 28px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .splitLeft{
      background:linear-gradient(135deg,#2f80ed,#6abfff);
      color:#fff;
      border-radius:20px 0 0 20px;
      clip-path:polygon(0 0,100% 0,85% 100%,0 100%);
    }

    .splitRight{
      background:#fff;
      border:1px solid #ddd;
      border-left:none;
      border-radius:0 20px 20px 0;
      clip-path:polygon(15% 0,100% 0,100% 100%,0 100%);
      margin-left:-20px;
    }

    /* ARROW */
    .heroScroll{
      margin-top:25px;
      animation:bounce 1.4s infinite;
    }

    .heroScroll span{
      display:block;
      width:12px;
      height:12px;
      border-right:2px solid #666;
      border-bottom:2px solid #666;
      transform:rotate(45deg);
    }

    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(8px)}
    }

    /* MOBILE FIX */
    @media(max-width:760px){

      .heroInner{
        min-height:100svh;
        justify-content:center;
        transform:translateY(-30px);
      }

      .logo{
        width:120px;
      }

      .brand{
        font-size:56px;
      }

      .heroSub{
        font-size:18px;
        max-width:340px;
      }

      .splitCta{
        min-height:72px;
        font-size:14px;
      }

      .splitLeft{
        padding-right:36px;
      }

      .splitRight{
        padding-left:36px;
      }
    }
  </style>
</head>

<body>

<div class="topFade"></div>

<section class="hero">
  <div class="wrap">
    <div class="heroInner">

      <img class="logo" src="media/logob.png">

      <h1 class="brand">Intermediaire.io</h1>

      <p class="heroSub">
        Une seule demande, envoyée aux bons professionnels de votre région.
      </p>

      <div class="heroMiniLine">SIMPLE • RAPIDE • LOCAL</div>

      <div class="heroActions">
        <a class="splitCta splitLeft" href="#client">Je cherche un service</a>
        <a class="splitCta splitRight" href="#entrepreneur">Je suis entrepreneur</a>
      </div>

      <a class="heroScroll" href="#client">
        <span></span>
      </a>

    </div>
  </div>
</section>

</body>
</html>
