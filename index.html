<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FELT — AI Poker Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#161616;
  --border:rgba(255,255,255,0.06); --white:#f0ede8;
  --muted:#404040; --muted2:#2a2a2a;
  --gold:#d4a847; --gold-soft:rgba(212,168,71,0.12);
  --red:#e05252; --red-soft:rgba(224,82,82,0.12);
  --green:#4caf80; --green-soft:rgba(76,175,128,0.12);
  --blue:#5b9cf6; --blue-soft:rgba(91,156,246,0.12);
  --orange:#f0814a; --orange-soft:rgba(240,129,74,0.12);
}
html,body { height:100%; background:var(--bg); color:var(--white); overflow:hidden; }
body { font-family:'JetBrains Mono',monospace; display:flex; flex-direction:column; }

/* HEADER */
#header { flex-shrink:0; padding:18px 18px 14px; }
#decision-chip {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:8px 16px; margin-bottom:12px;
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
}
#decision-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--muted); transition:background 0.4s ease; flex-shrink:0;
}
#decision-chip-text {
  font-family:'Syne',sans-serif; font-size:12px; font-weight:600;
  letter-spacing:0.08em; color:var(--muted); transition:color 0.4s ease;
}
#confidence-badge { font-size:10px; color:var(--muted); margin-left:2px; transition:color 0.4s ease; }
#decision-main {
  font-family:'Syne',sans-serif; font-size:clamp(36px,10vw,52px);
  font-weight:800; letter-spacing:-0.02em; line-height:1;
  color:var(--white); transition:color 0.4s ease; margin-bottom:5px;
}
#decision-reason {
  font-size:11px; color:var(--muted); font-weight:300;
  letter-spacing:0.02em; line-height:1.6; max-width:340px; min-height:16px;
}

/* STATE COLORS */
.s-fold #decision-main{color:var(--red)} .s-fold #decision-dot{background:var(--red);box-shadow:0 0 8px var(--red)}
.s-fold #decision-chip{border-color:rgba(224,82,82,0.2);background:var(--red-soft)} .s-fold #decision-chip-text{color:var(--red)}
.s-call #decision-main{color:var(--blue)} .s-call #decision-dot{background:var(--blue);box-shadow:0 0 8px var(--blue)}
.s-call #decision-chip{border-color:rgba(91,156,246,0.2);background:var(--blue-soft)} .s-call #decision-chip-text{color:var(--blue)}
.s-raise #decision-main{color:var(--green)} .s-raise #decision-dot{background:var(--green);box-shadow:0 0 8px var(--green)}
.s-raise #decision-chip{border-color:rgba(76,175,128,0.2);background:var(--green-soft)} .s-raise #decision-chip-text{color:var(--green)}
.s-allin #decision-main{color:var(--orange)} .s-allin #decision-dot{background:var(--orange);box-shadow:0 0 10px var(--orange);animation:pdot 0.8s ease-in-out infinite}
.s-allin #decision-chip{border-color:rgba(240,129,74,0.2);background:var(--orange-soft)} .s-allin #decision-chip-text{color:var(--orange)}
.s-check #decision-main{color:var(--white)} .s-check #decision-dot{background:var(--white)}
.s-check #decision-chip{border-color:rgba(240,237,232,0.15)} .s-check #decision-chip-text{color:var(--white)}
.s-scanning #decision-main{color:var(--gold)} .s-scanning #decision-dot{background:var(--gold);animation:pdot 1s ease-in-out infinite}
.s-scanning #decision-chip{border-color:rgba(212,168,71,0.2);background:var(--gold-soft)} .s-scanning #decision-chip-text{color:var(--gold)}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)}}

/* CAMERA */
#camera-wrap {
  flex:1; position:relative; overflow:hidden;
  margin:0 14px; border-radius:22px; background:#060606; min-height:0;
}
#video { width:100%; height:100%; object-fit:cover; display:block; border-radius:22px; }
#camera-wrap::after {
  content:''; position:absolute; inset:0; border-radius:22px;
  background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.55) 100%);
  pointer-events:none; z-index:2;
}
#scan-overlay { display:none; position:absolute; inset:0; border-radius:22px; z-index:3; pointer-events:none; overflow:hidden; }
.s-scanning #scan-overlay { display:block; }
#scan-line-el {
  position:absolute; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,71,0.7) 40%,rgba(212,168,71,1) 50%,rgba(212,168,71,0.7) 60%,transparent);
  animation:scanl 2.5s ease-in-out infinite;
}
@keyframes scanl{0%{top:10%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:90%;opacity:0}}
#no-cam { display:none; position:absolute; inset:0; align-items:center; justify-content:center; flex-direction:column; gap:8px; z-index:5; }
#no-cam.show { display:flex; }
#no-cam p { font-size:11px; color:var(--muted); letter-spacing:0.1em; text-align:center; line-height:1.8; }

/* INSIGHT */
#insight-pill {
  margin:8px 14px 0; background:var(--gold-soft); border:1px solid rgba(212,168,71,0.18);
  border-radius:14px; padding:9px 14px; font-size:11px; color:var(--gold);
  letter-spacing:0.03em; line-height:1.5; display:none;
}
#insight-pill.show { display:block; }

/* MY HAND */
#my-hand { flex-shrink:0; padding:10px 14px 0; display:flex; gap:10px; align-items:stretch; }
#cards-area { display:flex; gap:5px; align-items:center; }
.card {
  width:38px; height:52px; background:var(--surface); border:1px solid var(--border);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:14px; font-weight:800; transition:all 0.3s ease;
}
.card.red{color:#e05252} .card.black{color:var(--white)} .card.empty{color:var(--muted2);font-size:20px;font-weight:300}
#my-info { flex:1; display:flex; flex-direction:column; gap:5px; }
.info-row {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:7px 12px; display:flex; align-items:center; justify-content:space-between;
}
.info-label { font-size:9px; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; }
.info-value { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--white); }
.info-value.gold{color:var(--gold)} .info-value.green{color:var(--green)}

/* PLAYERS */
#players-section { flex-shrink:0; padding:10px 14px 0; }
#players-label { font-size:9px; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:7px; }
#players-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
#players-scroll::-webkit-scrollbar{display:none}
.player-card {
  flex-shrink:0; background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:10px 12px; min-width:110px; position:relative; overflow:hidden;
  transition:border-color 0.3s ease;
}
.player-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  border-radius:16px 16px 0 0; background:var(--muted2); transition:background 0.3s ease;
}
.player-card.aggressive::before{background:var(--red)} .player-card.passive::before{background:var(--green)}
.player-card.loose::before{background:var(--orange)} .player-card.tight::before{background:var(--blue)}
.player-card.bluffer::before{background:var(--gold)} 
.player-card.aggressive{border-color:rgba(224,82,82,0.15)} .player-card.passive{border-color:rgba(76,175,128,0.15)}
.player-card.loose{border-color:rgba(240,129,74,0.15)} .player-card.tight{border-color:rgba(91,156,246,0.15)}
.player-card.bluffer{border-color:rgba(212,168,71,0.15)}
.player-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--white);margin-bottom:2px}
.player-type{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.player-card.aggressive .player-type{color:var(--red)} .player-card.passive .player-type{color:var(--green)}
.player-card.loose .player-type{color:var(--orange)} .player-card.tight .player-type{color:var(--blue)}
.player-card.bluffer .player-type{color:var(--gold)}
.player-stat{font-size:9px;color:var(--muted);line-height:1.5}
.player-stat span{color:#666}
.player-notes{font-size:8px;color:#444;margin-top:3px;line-height:1.4}
.player-card-empty {
  flex-shrink:0; background:transparent; border:1px dashed var(--muted2);
  border-radius:16px; padding:10px 14px; min-width:90px; display:flex;
  align-items:center; justify-content:center; color:var(--muted2);
  font-size:10px; letter-spacing:0.1em; text-align:center; line-height:1.7;
}

/* CONTROLS */
#controls { flex-shrink:0; padding:10px 14px 28px; display:flex; gap:8px; align-items:center; }
#btn-analyze {
  flex:1; height:54px; background:var(--white); color:var(--bg);
  border:none; border-radius:100px; font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:0.06em; cursor:pointer;
  transition:all 0.2s ease; position:relative; overflow:hidden;
}
#btn-analyze:active{transform:scale(0.98)}
#btn-analyze.loading{background:var(--gold);pointer-events:none}
#btn-auto,#btn-flip {
  width:54px; height:54px; background:var(--surface); border:1px solid var(--border);
  border-radius:50%; color:var(--muted); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s ease; flex-shrink:0;
}
#btn-auto.active{border-color:rgba(212,168,71,0.4);color:var(--gold);background:var(--gold-soft)}
#btn-flip:active{opacity:0.6;transform:scale(0.95)}

#capture-canvas{display:none}
#toast {
  position:fixed; bottom:110px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:100px; padding:8px 18px; font-size:11px;
  letter-spacing:0.08em; color:#888; opacity:0;
  transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
  pointer-events:none; white-space:nowrap; z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app" class="s-waiting">

  <div id="header">
    <div id="decision-chip">
      <div id="decision-dot"></div>
      <span id="decision-chip-text">EN ATTENTE</span>
      <span id="confidence-badge"></span>
    </div>
    <div id="decision-main">—</div>
    <div id="decision-reason">Pointe ta caméra vers la table de poker</div>
  </div>

  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="capture-canvas"></canvas>
    <div id="scan-overlay"><div id="scan-line-el"></div></div>
    <div id="no-cam"><p>Caméra non disponible<br>Vérifie les permissions Safari</p></div>
  </div>

  <div id="insight-pill"></div>

  <div id="my-hand">
    <div id="cards-area">
      <div class="card empty" id="card1">?</div>
      <div class="card empty" id="card2">?</div>
    </div>
    <div id="my-info">
      <div class="info-row">
        <span class="info-label">Mon stack</span>
        <span class="info-value gold" id="my-stack">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Pot · Ma mise</span>
        <span class="info-value" id="pot-info">— · —</span>
      </div>
    </div>
  </div>

  <div id="players-section">
    <div id="players-label">Joueurs à la table</div>
    <div id="players-scroll">
      <div class="player-card-empty">Aucun<br>joueur<br>détecté</div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-flip" onclick="flipCamera()">⟳</button>
    <button id="btn-analyze" onclick="analyzeNow()">Analyser la table</button>
    <button id="btn-auto" onclick="toggleAuto()">⚡</button>
  </div>

</div>
<div id="toast"></div>

<script>
const app = document.getElementById('app');
const video = document.getElementById('video');
const canvas = document.getElementById('capture-canvas');
const noCam = document.getElementById('no-cam');

let stream = null, facingMode = 'environment';
let autoMode = false, autoTimer = null, isAnalyzing = false;

let session = {
  scans:0, hands:0,
  players:{}, // id -> {type,notes,hands,lastAction,stack}
  history:[], myStack:null
};

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:1280},height:{ideal:720}}, audio:false
    });
    video.srcObject = stream;
    video.style.transform = facingMode==='user' ? 'scaleX(-1)' : 'scaleX(1)';
    noCam.classList.remove('show');
  } catch(e) {
    noCam.classList.add('show');
    toast('Accès caméra refusé');
  }
}

function flipCamera() {
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  if (stream) startCamera();
}

startCamera();

function captureFrame() {
  const w = video.videoWidth||640, h = video.videoHeight||480;
  canvas.width=w; canvas.height=h;
  const ctx = canvas.getContext('2d');
  if (facingMode==='user') { ctx.translate(w,0); ctx.scale(-1,1); }
  ctx.drawImage(video,0,0,w,h);
  return canvas.toDataURL('image/jpeg',0.85).split(',')[1];
}

async function analyzeNow() {
  if (isAnalyzing) return;
  if (!stream) { await startCamera(); return; }
  isAnalyzing=true;
  setState('s-scanning');
  setUI('LECTURE…','','');
  setBtnLoading(true);
  const img = captureFrame();
  session.scans++;

  const playersCtx = Object.keys(session.players).length>0
    ? '\nJOUEURS TRACKÉS:\n'+Object.entries(session.players).map(([n,p])=>
        `  ${n}: type=${p.type}, mains=${p.hands}, dernière action=${p.lastAction||'?'}, notes="${p.notes}"`
      ).join('\n')
    : '\nAucun joueur tracké.';

  const histCtx = session.history.length>0
    ? '\nDERNIÈRES DÉCISIONS:\n'+session.history.slice(-4).map(h=>`  ${h.decision} — ${h.sit}`).join('\n')
    : '';

  const prompt = `Tu es un coach poker d'élite niveau GTO + exploitative. Tu analyses une image d'une table de poker filmée en direct avec une caméra iPhone.

CONTEXTE SESSION:${playersCtx}${histCtx}
Stack précédemment détecté: ${session.myStack||'inconnu'}

Analyse l'image avec attention maximale. Réponds UNIQUEMENT en JSON valide, zéro texte avant/après:
{
  "gameDetected": boolean,
  "decision": "FOLD"|"CALL"|"RAISE"|"CHECK"|"ALL-IN"|"WAIT"|"NO GAME",
  "decisionDetail": "ex: raise 2.5x" ou null,
  "confidence": 0-100,
  "reasoning": "explication directe en français max 2 phrases",
  "myCards": ["As","Kd"] ou null,
  "boardCards": ["7h","8c","Qd"] ou null,
  "myStack": "ex: $245" ou null,
  "myBet": "ex: $40" ou null,
  "pot": "ex: $120" ou null,
  "position": "BTN"|"SB"|"BB"|"UTG"|"MP"|"CO" ou null,
  "handStrength": "ex: top pair top kicker" ou null,
  "potOdds": "ex: 28%" ou null,
  "equity": "ex: ~65%" ou null,
  "newHand": boolean,
  "insight": "observation psychologique clé sur un joueur ou la table" ou null,
  "players": [
    {
      "id": "Joueur 1"|"Joueur 2" etc,
      "type": "aggressive"|"passive"|"loose"|"tight"|"bluffer"|"unknown",
      "stack": "$320" ou null,
      "lastAction": "ex: 3-bet préflop",
      "notes": "comportement observé en 1 phrase courte"
    }
  ]
}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:img}},
          {type:'text',text:prompt}
        ]}]
      })
    });
    const data = await resp.json();
    const raw = data.content?.[0]?.text||'{}';
    const r = JSON.parse(raw.replace(/```json|```/g,'').trim());
    processResult(r);
  } catch(e) {
    setState('s-waiting');
    setUI('ERREUR','','Réessaie dans un instant');
    console.error(e);
  }
  isAnalyzing=false;
  setBtnLoading(false);
}

function processResult(r) {
  if (!r.gameDetected || r.decision==='NO GAME') {
    setState('s-waiting');
    setUI('AUCUN JEU','','Aucune table détectée');
    document.getElementById('insight-pill').classList.remove('show');
    return;
  }
  const dec = r.decision||'WAIT';
  const detail = r.decisionDetail ? ` — ${r.decisionDetail}` : '';
  const conf = r.confidence ? `${r.confidence}%` : '';
  const stateMap = {FOLD:'s-fold',CALL:'s-call',RAISE:'s-raise','ALL-IN':'s-allin',CHECK:'s-check',WAIT:'s-waiting'};
  setState(stateMap[dec]||'s-waiting');
  setUI(dec+detail, conf, r.reasoning||'');

  if (r.newHand) session.hands++;
  if (r.myStack) session.myStack = r.myStack;

  renderCards(r.myCards);
  document.getElementById('my-stack').textContent = r.myStack||session.myStack||'—';
  const pi = [r.pot?`Pot ${r.pot}`:null, r.myBet?`Mise ${r.myBet}`:null].filter(Boolean).join(' · ');
  document.getElementById('pot-info').textContent = pi||'—';

  const pill = document.getElementById('insight-pill');
  if (r.insight) { pill.textContent='💡 '+r.insight; pill.classList.add('show'); }
  else pill.classList.remove('show');

  if (r.players?.length>0) {
    r.players.forEach(p=>{
      if (!session.players[p.id]) session.players[p.id]={type:'unknown',notes:'',hands:0,lastAction:null,stack:null};
      const ex = session.players[p.id];
      ex.type = p.type||ex.type;
      ex.lastAction = p.lastAction||ex.lastAction;
      ex.stack = p.stack||ex.stack;
      ex.hands++;
      if (p.notes && !ex.notes.includes(p.notes)) {
        ex.notes = ex.notes ? ex.notes+' · '+p.notes : p.notes;
      }
    });
    renderPlayers();
  }

  if (r.reasoning) {
    session.history.push({decision:dec, sit:r.reasoning});
    if (session.history.length>20) session.history.shift();
  }
}

function renderCards(cards) {
  const suits={'h':'♥','d':'♦','c':'♣','s':'♠'};
  const red=['h','d'];
  function parse(s){ if(!s) return null; const r=s.slice(0,-1).toUpperCase(); const su=s.slice(-1).toLowerCase(); return {txt:r+(suits[su]||su), red:red.includes(su)}; }
  const c1=document.getElementById('card1'), c2=document.getElementById('card2');
  const p1=parse(cards?.[0]), p2=parse(cards?.[1]);
  if(p1){c1.textContent=p1.txt; c1.className='card '+(p1.red?'red':'black');}
  else{c1.textContent='?'; c1.className='card empty';}
  if(p2){c2.textContent=p2.txt; c2.className='card '+(p2.red?'red':'black');}
  else{c2.textContent='?'; c2.className='card empty';}
}

function renderPlayers() {
  const s=document.getElementById('players-scroll');
  if(!Object.keys(session.players).length){
    s.innerHTML='<div class="player-card-empty">Aucun<br>joueur<br>détecté</div>'; return;
  }
  s.innerHTML=Object.entries(session.players).map(([name,p])=>`
    <div class="player-card ${p.type}">
      <div class="player-name">${name}</div>
      <div class="player-type">${p.type}</div>
      <div class="player-stat">${p.stack?`Stack <span>${p.stack}</span>`:''}</div>
      <div class="player-stat">Mains <span>${p.hands}</span></div>
      ${p.lastAction?`<div class="player-stat">Action <span>${p.lastAction}</span></div>`:''}
      ${p.notes?`<div class="player-notes">${p.notes.slice(0,70)}${p.notes.length>70?'…':''}</div>`:''}
    </div>`).join('');
}

function setState(s){app.className=s;}
function setUI(main,conf,reason){
  document.getElementById('decision-main').textContent=main;
  document.getElementById('decision-chip-text').textContent=main.split('—')[0].trim();
  document.getElementById('confidence-badge').textContent=conf?`· ${conf}`:'';
  document.getElementById('decision-reason').textContent=reason;
}
function setBtnLoading(on){
  const b=document.getElementById('btn-analyze');
  b.classList.toggle('loading',on);
  b.textContent=on?'Analyse en cours…':'Analyser la table';
}

function toggleAuto(){
  autoMode=!autoMode;
  document.getElementById('btn-auto').classList.toggle('active',autoMode);
  if(autoMode){ autoTimer=setInterval(()=>{if(!isAnalyzing)analyzeNow();},9000); toast('Auto activé — toutes les 9s'); }
  else{ clearInterval(autoTimer); toast('Auto désactivé'); }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
</script>
</body>
</html>
