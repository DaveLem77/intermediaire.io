<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Intermediaire.io</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#2f80ed;
  --accent2:#6abfff;
  --text:#081a28;
  --muted:#6b8598;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter, sans-serif;
  background:#fff;
  color:var(--text);
}

/* LAYOUT */
.wrap{
  max-width:1100px;
  margin:auto;
  padding:0 20px;
}

/* HERO MODERNE */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(600px 300px at 50% 10%, rgba(47,128,237,0.18), transparent 70%),
    radial-gradient(400px 200px at 20% 20%, rgba(106,191,255,0.12), transparent 70%),
    radial-gradient(400px 200px at 80% 20%, rgba(47,128,237,0.10), transparent 70%);
  z-index:0;
}

.heroInner{
  position:relative;
  z-index:2;
  max-width:820px;
}

/* LOGO */
.logo{
  width:100px;
  margin:0 auto 20px;
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* TITLE */
.brand{
  font-family:"Space Grotesk";
  font-size:clamp(42px,6vw,80px);
  letter-spacing:-0.08em;
}

/* TEXTE */
.heroSub{
  margin-top:20px;
  font-size:20px;
  color:var(--muted);
}

.heroSub span{
  display:block;
  margin-top:6px;
  font-weight:800;
  font-size:22px;
  background:linear-gradient(90deg,#2f80ed,#6abfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CTA */
.heroActions{
  margin-top:35px;
  display:flex;
  gap:14px;
  justify-content:center;
}

.cta{
  min-height:58px;
  padding:0 26px;
  border-radius:14px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}

.ctaPrimary{
  background:linear-gradient(135deg,#2f80ed,#6abfff);
  color:#fff;
}

.ctaGhost{
  border:1px solid rgba(0,0,0,.08);
}

/* SECTION */
.section{
  padding:60px 0;
}

h2{
  font-size:30px;
  margin-bottom:10px;
}

.clientForm{
  max-width:520px;
  margin-top:20px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border:none;
  border-bottom:1px solid #ddd;
}

/* BUTTON */
button{
  padding:14px;
  border:none;
  background:linear-gradient(135deg,#2f80ed,#6abfff);
  color:#fff;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  color:#7a90a3;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="wrap">
    <div class="heroInner">

      <img class="logo" src="media/logob.png">

      <h1 class="brand">Intermediaire.io</h1>

      <p class="heroSub">
        Une seule demande.<br>
        <span>Les bons professionnels, instantanément.</span>
      </p>

      <div class="heroActions">
        <a class="cta ctaPrimary" href="#client">Trouver un service</a>
        <a class="cta ctaGhost" href="#entrepreneur">Je suis entrepreneur</a>
      </div>

    </div>
  </div>
</section>

<!-- CLIENT -->
<section id="client" class="section">
  <div class="wrap">
    <h2>Faire une demande</h2>

    <div class="clientForm">
      <form action="https://hook.us2.make.com/to346qlepm88si74k1dngnwnawkd3b79" method="post">

        <input type="text" name="nom" placeholder="Nom complet" required>
        <input type="text" name="ville" placeholder="Ville" required>
        <input type="tel" name="telephone" placeholder="Téléphone" required>
        <input type="email" name="courriel" placeholder="Courriel" required>

        <textarea name="besoin" placeholder="Décrivez votre besoin..." required></textarea>

        <button type="submit">Envoyer</button>
      </form>
    </div>
  </div>
</section>

<footer>
© 2026 Intermediaire.io
</footer>

</body>
</html>
