<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Intermediaire.io</title>

<link rel="icon" type="image/png" href="media/logob.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#fbfdff;
  --text:#102334;
  --title:#081a28;
  --muted:#6f8597;
  --accent:#2f80ed;
  --accent2:#6abfff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:linear-gradient(180deg,#f6fbff 0%,#ffffff 100%);
  color:var(--text);
}

/* HERO */

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
}

/* ✅ LOGO PLUS GROS (seule modif) */

.logo{
  width:130px;
  height:130px;
  margin:auto;
  margin-bottom:14px;
  filter:drop-shadow(0 22px 38px rgba(47,128,237,.14));
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* TITLE */

.brand{
  font-family:"Space Grotesk", sans-serif;
  font-size:clamp(42px,6vw,74px);
  letter-spacing:-0.095em;
  margin:0;
}

/* SUB */

.sub{
  margin-top:14px;
  color:var(--muted);
  font-weight:600;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

/* BUTTON SPLIT */

.heroActions{
  display:flex;
  justify-content:center;
  margin-top:34px;
}

.split{
  display:flex;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,.1));
}

.btn{
  position:relative;
  padding:22px 32px;
  font-weight:800;
  font-size:15px;
  overflow:hidden;
}

/* LEFT */

.btn-left{
  background:linear-gradient(135deg,#2f80ed,#6abfff);
  color:white;
  border-radius:24px 0 0 24px;
  clip-path:polygon(0 0,100% 0,92% 100%,0 100%);
  padding-right:46px;
}

/* RIGHT WHITE */

.btn-right{
  background:white;
  color:#0b2233;
  border-radius:0 24px 24px 0;
  clip-path:polygon(8% 0,100% 0,100% 100%,0 100%);
  margin-left:-18px;
  padding-left:46px;
  border:1px solid rgba(0,0,0,.08);
}

/* ANIMATION */

.btn::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
  transform:skewX(-20deg);
  animation:shine 5s infinite;
}

@keyframes shine{
  0%{left:-100%}
  40%{left:130%}
  100%{left:130%}
}

/* FORM SECTION */

.section{
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

input, textarea, select{
  width:100%;
  padding:14px 0;
  border:none;
  border-bottom:1px solid rgba(0,0,0,.15);
  background:transparent;
  font-weight:600;
}

textarea{min-height:100px}

button{
  margin-top:20px;
  padding:14px 20px;
  background:linear-gradient(135deg,#2f80ed,#6abfff);
  border:none;
  color:white;
  font-weight:800;
  border-radius:12px;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

  .logo{
    width:110px;
    height:110px;
  }

  .split{
    width:100%;
  }

  .btn{
    width:50%;
    padding:18px;
    font-size:13px;
  }
}

</style>
</head>

<body>

<section class="hero">

  <div>

    <img src="media/logob.png" class="logo">

    <h1 class="brand">Intermediaire.io</h1>

    <div class="sub">
      Trouve rapidement le bon service local, sans perdre ton temps.
    </div>

    <div class="heroActions">
      <div class="split">
        <a href="#client" class="btn btn-left">Je cherche un service</a>
        <a href="#entrepreneur" class="btn btn-right">Je suis entrepreneur</a>
      </div>
    </div>

  </div>

</section>

<section id="client" class="section">

  <h2>Demande rapide</h2>

  <form action="https://hook.us2.make.com/to346qlepm88si74k1dngnwnawkd3b79" method="post">

    <select name="service">
      <option>Toiture</option>
      <option>Plomberie (à venir)</option>
    </select>

    <input type="text" placeholder="Nom" required>
    <input type="text" placeholder="Ville" required>
    <input type="tel" placeholder="Téléphone" required>

    <textarea placeholder="Ton besoin"></textarea>

    <button>Envoyer</button>

  </form>

</section>

<section id="entrepreneur" class="section">

  <h2>Recevoir des clients</h2>

  <p style="color:var(--muted);max-width:500px">
    Reçois des demandes claires de clients dans ta région.
  </p>

</section>

</body>
</html>
